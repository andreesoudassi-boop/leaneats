// Hämta cache från localStorage
function getImgCache() {
  try {
    return JSON.parse(localStorage.getItem(IMG_CACHE_KEY) || "{}");
  } catch(e) { return {}; }
}

function saveImgCache(cache) {
  try {
    localStorage.setItem(IMG_CACHE_KEY, JSON.stringify(cache));

}

function getFallbackImage(recipe) {
  // Hitta kategorin via receptets ID-prefix
  const prefix = recipe.id[0];
  const catMap = {'f': 'frukost', 'l': 'lunch', 'd': 'middag', 's': 'mellanmal'};
  const catId = catMap[prefix] || 'lunch';
  return {
    url: CATEGORY_FALLBACK_IMAGES[catId],
    thumb: CATEGORY_FALLBACK_IMAGES[catId],
    photographer: "Unsplash",
    photographerUrl: "https://unsplash.com",
    isFallback: true
  };
}

// Hämta bild för ett recept (med cache + fallback)
async function fetchRecipeImage(recipe) {
  const cache = getImgCache();
  if (cache[recipe.id]) return cache[recipe.id];
  
  const query = recipeToSearchTerm(recipe);
  try {
    const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=3&orientation=landscape&client_id=${UNSPLASH_KEY}`;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        const result = data.results[0];
        const imgData = {
          url: result.urls.regular,
          thumb: result.urls.small,
          photographer: result.user.name,
          photographerUrl: result.user.links.html
        };
        // Spara i cache
        cache[recipe.id] = imgData;
        saveImgCache(cache);
        return imgData;
      }
    }
  } catch(e) {
    console.log("Unsplash error for", recipe.name, e);
  }
  
  // Fallback: kategori-bild (men spara INTE som cache så vi kan försöka igen senare)
  return getFallbackImage(recipe);
}

// Auto-tagga recept baserat på namn + ingredienser
function classifyRecipe(recipe, catId) {
  const text = (recipe.name + " " + JSON.stringify(recipe.ingredients) + " " + (recipe.tag||"")).toLowerCase();
  
  // Protein-typ för alla kategorier
  const types = [];
  if (/kyckling|kalkon/.test(text)) types.push("kyckling");
  if (/nötfärs|oxfilé|biff|köttfärs|nötbog|nötkött|wagyu|chateaubriand|tournedos|ankbröst|anka|lamm|fläsk|hjort|\bkött\b/.test(text)) types.push("kott");
  if (/\blax\b|tonfisk|räkor|torsk|forell|makrill|sardiner|hälleflundra|musslor|ostron|krabba|hummer|pilgrimsmussl|langustin|bläckfisk|sashimi|ceviche|havskräft|stör|gravlax|laxfilé|skaldjur|fisk/.test(text)) types.push("fisk");
  if (/\bägg\b|äggvitor|frittata|omelett|pocherat|speglägg/.test(text)) types.push("agg");
  if (/tofu|tempeh|bönor|kikärt|linser|edamame|halloumi|fetaost|svamp|champinjon|vegan|vegetarisk|grönsak/.test(text)) types.push("veg");
  
  // Om inget matchar, kolla om det är skinka/prosciutto etc
  if (types.length === 0) {
    if (/skinka|prosciutto|parmaskinka|kalkonkorv|kycklingkorv/.test(text)) types.push("kott");
  }
  
  return types.length > 0 ? types : ["veg"];
}

function getRandom(catId, excludeId) {
  const pool = ALL_RECIPES[catId].filter(r => r.id !== excludeId);
  return pool[Math.floor(Math.random() * pool.length)];
}

// ─── BMR / TDEE / MAKRON ──────────────────────────────────────────────────
const ACTIVITY_LEVELS = [
  { id:"sedentary",   label:"Stillasittande",    emoji:"🪑", desc:"Kontorsjobb, inget gym",        mult:1.2  },
  { id:"light",       label:"Lätt aktiv",         emoji:"🚶", desc:"Promenader, 1-2 pass/vecka",    mult:1.375 },
  { id:"moderate",    label:"Aktiv",              emoji:"🏃", desc:"3-5 pass/vecka",                mult:1.55  },
  { id:"active",      label:"Mycket aktiv",       emoji:"💪", desc:"6-7 pass/vecka",                mult:1.725 },
  { id:"very_active", label:"Extremt aktiv",      emoji:"🔥", desc:"Tungt jobb + 2x träning/dag",   mult:1.9   },
];

const GOAL_OPTIONS = [
  { id:"deffa",      label:"Deffa",      emoji:"🔥", desc:"Bränn fett",       kcalDelta:-500 },
  { id:"underhall",  label:"Underhåll",  emoji:"⚖️", desc:"Behåll vikten",    kcalDelta:0    },
  { id:"bulka",      label:"Bulka",      emoji:"💪", desc:"Bygg muskler",     kcalDelta:300  },
];

function calculateBMR(gender, weightKg, heightCm, ageYears) {
  const w = Number(weightKg), h = Number(heightCm), a = Number(ageYears);
  if (!w || !h || !a) return 0;
  const base = 10 * w + 6.25 * h - 5 * a;
  return Math.round(gender === "kvinna" ? base - 161 : base + 5);
}

function calculateTDEE(bmr, activityId) {
  const lvl = ACTIVITY_LEVELS.find(a => a.id === activityId) || ACTIVITY_LEVELS[2];
  return Math.round(bmr * lvl.mult);
}

function calculateTargetKcal(tdee, goalId) {
  const goal = GOAL_OPTIONS.find(g => g.id === goalId) || GOAL_OPTIONS[0];
  return Math.max(1200, Math.min(4000, tdee + goal.kcalDelta));
}

// ─── RECIPE IMAGE KOMPONENT ────────────────────────────────────────────────
function RecipeImage({ recipe, height = 200, borderRadius = 12, fallbackEmojiSize = 80 }) {
  const [imgData, setImgData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [imgFailed, setImgFailed] = React.useState(false);

  React.useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setImgFailed(false);
    setImgData(null);
    // Kolla cache först
    const cache = getImgCache();
    if (cache[recipe.id]) {
      setImgData(cache[recipe.id]);
      setLoading(false);
      return;
    }
    // Hämta från API (eller fallback)
    fetchRecipeImage(recipe).then(data => {
      if (cancelled) return;
      setImgData(data);
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [recipe.id]);

  if (imgData && !imgFailed) {
    return (
      <div style={{position:"relative",width:"100%",height,borderRadius,overflow:"hidden",background:"#1a1a14"}}>
        <img 
          src={imgData.url} 
          alt={recipe.name}
          onError={()=>setImgFailed(true)}
          style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}
        />
        {/* Emoji badge uppe till vänster */}
        <div style={{position:"absolute",top:10,left:10,fontSize:28,background:"rgba(0,0,0,0.6)",borderRadius:"50%",width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)"}}>
          {recipe.emoji}
        </div>
        {/* Fotograf-credit (bara om inte fallback) */}
        {!imgData.isFallback && (
          <div style={{position:"absolute",bottom:6,right:8,fontSize:8,color:"rgba(255,255,255,0.6)",background:"rgba(0,0,0,0.5)",padding:"2px 6px",borderRadius:4,backdropFilter:"blur(4px)"}}>
            📷 {imgData.photographer}
          </div>
        )}
      </div>
    );
  }

  // Fallback: emoji på tonad bakgrund (när laddar eller allt misslyckats)
  return (
    <div style={{width:"100%",height,borderRadius,background:"linear-gradient(135deg,#1a1a18,#0e0e0c)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      {loading ? (
        <div style={{fontSize:24,opacity:0.3}}>⏳</div>
      ) : (
        <div style={{fontSize:fallbackEmojiSize}}>{recipe.emoji}</div>
      )}
    </div>
  );
}

  // ── Firebase auth listener ───────────────────────────────────────────────
  useEffect(() => {

            if (data.todayDate === todayStr) {
              setTodayKcal(data.todayKcal || 0);

    return unsub;

  // ── Save to Firestore ────────────────────────────────────────────────────

  const handleLogin = async () => {

  const resendVerification = async () => {

  const checkVerification = async () => {

    try {

  // ── Lägg till måltid i dagens tracker (använder skalade värden) ──
  const addMealToTracker = async (recipe) => {
    const todayStr = new Date().toISOString().split('T')[0];
    // Om ny dag, nolla först
    let baseKcal = todayDate === todayStr ? todayKcal : 0;
    let baseProtein = todayDate === todayStr ? todayProtein : 0;
    let baseCarbs = todayDate === todayStr ? todayCarbs : 0;
    let baseFat = todayDate === todayStr ? todayFat : 0;
    let baseMeals = todayDate === todayStr ? todayMeals : [];
    
    // SKALA receptets värden efter användarens mål
    const factor = dailyKcal / 2000;
    const scaledKcal = Math.round((recipe.kcal || 0) * factor);
    const scaledProtein = Math.round((recipe.protein || 0) * factor);
    const scaledCarbs = Math.round((recipe.carbs || 0) * factor);
    const scaledFat = Math.round((recipe.fat || 0) * factor);
    
    const newKcal = baseKcal + scaledKcal;
    const newProtein = baseProtein + scaledProtein;
    const newCarbs = baseCarbs + scaledCarbs;
    const newFat = baseFat + scaledFat;
    const newMeals = [...baseMeals, {
      id: recipe.id,
      name: recipe.name,
      emoji: recipe.emoji,
      kcal: scaledKcal,
      protein: scaledProtein,
      carbs: scaledCarbs,
      fat: scaledFat,
      time: new Date().toISOString()
    }];
    
    setTodayKcal(newKcal);
    setTodayProtein(newProtein);
    setTodayCarbs(newCarbs);
    setTodayFat(newFat);
    setTodayMeals(newMeals);
    setTodayDate(todayStr);
    
    await saveToCloud({
      todayDate: todayStr,
      todayKcal: newKcal,
      todayProtein: newProtein,
      todayCarbs: newCarbs,
      todayFat: newFat,
      todayMeals: newMeals
    });
    await updateStreak();
  };
  
  // ── Ångra senaste måltid ──
  const undoLastMeal = async () => {
    if (todayMeals.length === 0) return;
    const last = todayMeals[todayMeals.length - 1];
    const newKcal = Math.max(0, todayKcal - last.kcal);
    const newProtein = Math.max(0, todayProtein - last.protein);
    const newCarbs = Math.max(0, todayCarbs - last.carbs);
    const newFat = Math.max(0, todayFat - last.fat);
    const newMeals = todayMeals.slice(0, -1);
    
    setTodayKcal(newKcal);
    setTodayProtein(newProtein);
    setTodayCarbs(newCarbs);
    setTodayFat(newFat);
    setTodayMeals(newMeals);
    
    await saveToCloud({
      todayKcal: newKcal,
      todayProtein: newProtein,
      todayCarbs: newCarbs,
      todayFat: newFat,
      todayMeals: newMeals
    });
  };

  // ── VATTEN ──
  const addWater = async () => {
    const todayStr = new Date().toISOString().split('T')[0];
    const baseWater = todayDate === todayStr ? todayWater : 0;
    const newWater = Math.min(12, baseWater + 1); // max 12 glas
    setTodayWater(newWater);
    setTodayDate(todayStr);
    await saveToCloud({ todayDate: todayStr, todayWater: newWater });
    // Uppdatera streak om man lagt till vatten (räknas som aktiv dag)
    await updateStreak();
  };
  
  const removeWater = async () => {
    const newWater = Math.max(0, todayWater - 1);
    setTodayWater(newWater);
    await saveToCloud({ todayWater: newWater });
  };

  // ── STREAK ──
  // Räknar dagar i rad användaren har varit aktiv (loggat mat ELLER vatten)
  const updateStreak = async () => {
    const todayStr = new Date().toISOString().split('T')[0];
    if (streakLastDate === todayStr) return; // redan aktiv idag
    
    // Kolla om igår var aktiv
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toISOString().split('T')[0];
    
    let newStreak;
    if (streakLastDate === yesterdayStr) {
      // Fortsätt streak
      newStreak = streakCount + 1;
    } else if (streakLastDate === "" || streakLastDate < yesterdayStr) {
      // Ny streak (första gången eller avbrutet)
      newStreak = 1;
    } else {
      newStreak = streakCount;
    }
    
    setStreakCount(newStreak);
    setStreakLastDate(todayStr);
    await saveToCloud({ streakCount: newStreak, streakLastDate: todayStr });
  };

  // ── Skala recept efter dagligt kaloriintag ──
  // Standardrecept är byggt för 2000 kcal/dag. Skala med faktor = dailyKcal / 2000
  const getScaleFactor = () => {
    return dailyKcal / 2000;
  };
  
  const scaleAmount = (amount) => {
    const factor = getScaleFactor();
    if (factor === 1 || !amount) return amount;
    // Försök extrahera siffra + enhet från strängen, t.ex. "400g" eller "1 msk" eller "2 st"
    const match = String(amount).match(/^(\d+(?:[.,]\d+)?)\s*(.*)$/);
    if (!match) return amount;
    const num = parseFloat(match[1].replace(",", "."));
    const unit = match[2];
    const scaled = num * factor;
    // Avrunda snyggt
    let rounded;
    if (scaled >= 100) rounded = Math.round(scaled / 10) * 10; // avrunda till 10-tal (430 inte 428)
    else if (scaled >= 10) rounded = Math.round(scaled); // heltal
    else rounded = Math.round(scaled * 10) / 10; // en decimal
    return `${rounded}${unit ? (unit.startsWith(" ") ? "" : " ") + unit : ""}`.trim();
  };
  
  const scaleNumber = (n) => Math.round((n || 0) * getScaleFactor());

  // ── Hjälpfunktion: hämta filtrerade recept (exkl favoriter) ──
  const getFilteredRecipes = (catId, filters) => {
    const all = ALL_RECIPES[catId] || [];
    const favIds = new Set(favorites.map(f => f.id));
    const notLiked = all.filter(r => !favIds.has(r.id));
    // filters kan vara string ("all", "kyckling") eller array
    const filterArr = Array.isArray(filters) ? filters : [filters];
    if (filterArr.length === 0 || filterArr.includes("all")) return notLiked;
    return notLiked.filter(r => {
      const types = classifyRecipe(r, catId);
      return filterArr.some(f => types.includes(f));
    });
  };

  // ── Tinder: swipa höger (JA) = spara favorit + försvinner från högen ──
  const handleTinderYes = async () => {
    const recipes = getFilteredRecipes(tinderCatId, proteinFilter);
    const recipe = recipes[tinderIndex];
    if (!recipe) return;
    setSwipeDir("right");
    
    const newFavs = [...favorites, recipe];
    setFavorites(newFavs);
    await saveToCloud({ favorites: newFavs });
    
    const newUsed = !isPremium && freeUsed < FREE_LIMIT ? freeUsed + 1 : freeUsed;
    if (newUsed !== freeUsed) {
      setFreeUsed(newUsed);
      await saveToCloud({ freeUsed: newUsed });
    }
    
    setTimeout(() => {
      setSwipeDir(null);
      setTinderHistory([]);
    }, 350);
  };

  // ── Tinder: swipa vänster (NEJ) ──
  const handleTinderNo = () => {
    const recipes = getFilteredRecipes(tinderCatId, proteinFilter);
    const safeIdx = Math.min(tinderIndex, recipes.length - 1);
    if (safeIdx >= recipes.length - 1) return;
    setSwipeDir("left");
    setTinderHistory([...tinderHistory, safeIdx]);
    setTimeout(() => {
      setTinderIndex(safeIdx + 1);
      setSwipeDir(null);
    }, 300);

  const handleTinderUndo = () => {

    const prev = tinderHistory[tinderHistory.length - 1];

    setSavedCard(card);
    setPaymentMethod("card");

  const saveGoal = async (goal, kcal) => {

  const formatExp = (v) => { const d = v.replace(/\D/g,"").slice(0,4); return d.length>2?d.slice(0,2)+"/"+d.slice(2):d; };

  const navBtn = (id, emoji, label) => (

    }}>

  // ── Loading screen ───────────────────────────────────────────────────────
  if (!authReady) return (
    <div style={{minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48,filter:"drop-shadow(0 0 24px rgba(232,201,122,0.5))"}}>🔥</div>
      <div style={{fontSize:14,color:"#444"}}>Laddar FitFuel...</div>
    </div>
  );

  // ── Login/Signup screen ──────────────────────────────────────────────────
  if (!user) return (
    <div style={{minHeight:"100vh",background:"#080808",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at 50% 0%,#1a1a08 0%,transparent 60%)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:400,position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:52,marginBottom:10,filter:"drop-shadow(0 0 24px rgba(232,201,122,0.5))"}}>🔥</div>

          <p style={{fontSize:13,color:"#444"}}>Kalorisnål mat för träning & vardag</p>
        </div>
        <div style={{background:"#0e0e0c",border:"1px solid #1a1a14",borderRadius:18,padding:"22px"}}>
          <div style={{display:"flex",marginBottom:18,background:"#0a0a08",borderRadius:10,padding:3}}>
            {[["login","Logga in"],["signup","Skapa konto"]].map(([s,l])=>(
              <button key={s} onClick={()=>{setAuthMode(s);setAuthError("");}} style={{
                flex:1,padding:"8px",background:authMode===s?"#1a1a14":"transparent",

              }}>{l}</button>
            ))}
          </div>
          {authMode==="signup" && <Field label="Namn" value={authName} onChange={setAuthName} placeholder="Ditt namn"/>}
          <Field label="E-post" value={authEmail} onChange={setAuthEmail} type="email" placeholder="din@epost.se"/>
          <Field label="Lösenord" value={authPass} onChange={v=>{setAuthPass(v);setAuthError("");}} type="password" placeholder="Minst 6 tecken"/>
          {authError && <div style={{fontSize:12,color:"#cc7a7a",marginBottom:12,textAlign:"center",background:"#1a0a0a",padding:"8px",borderRadius:8}}>{authError}</div>}
          <button onClick={authMode==="login"?handleLogin:handleSignup} disabled={authLoading} style={{
            width:"100%",padding:"13px",borderRadius:10,marginTop:4,

            color:authLoading?"#555":"#0d0d0d",border:"none",fontFamily:"inherit",fontSize:15,fontWeight:700,cursor:authLoading?"wait":"pointer"
          }}>{authLoading?"Vänta...":(authMode==="login"?"Logga in →":"Skapa konto →")}</button>
          <div style={{textAlign:"center",marginTop:12,fontSize:12,color:"#333"}}>
            {authMode==="login"
              ?<span>Inget konto? <span style={{color:"#e8c97a",cursor:"pointer"}} onClick={()=>{setAuthMode("signup");setAuthError("");}}>Skapa ett</span></span>
              :<span>Har konto? <span style={{color:"#e8c97a",cursor:"pointer"}} onClick={()=>{setAuthMode("login");setAuthError("");}}>Logga in</span></span>
            }
          </div>
        </div>
      </div>
    </div>
  );

  // ── Main app ─────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"Georgia,serif",color:T.text,paddingBottom:72}}>
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",background:`radial-gradient(ellipse at 50% 0%,${T.gradStart} 0%,transparent 55%)`}}/>

      {/* TOP NAV */}
      <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"13px 18px",borderBottom:`1px solid ${T.border}`,background:T.navBg,backdropFilter:"blur(16px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:18}}>🔥</span>
          <span style={{fontSize:17,fontWeight:700,letterSpacing:"0.06em",color:T.accent}}>FitFuel</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {!isPremium && <span style={{fontSize:11,color:T.textFaint}}>{freeLeft} kvar</span>}
          {isPremium
            ? <span style={{fontSize:11,color:T.accent,background:isDark?"#1a1a08":"#f8f0d8",border:`1px solid ${isDark?"#3a3010":"#e0d0a0"}`,borderRadius:99,padding:"3px 10px"}}>✨ Premium</span>
            : <button onClick={()=>setPricingOpen(true)} style={{fontSize:11,color:"#0d0d0d",background:"linear-gradient(135deg,#e8c97a,#c4a852)",border:"none",borderRadius:99,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>100 kr/mån</button>
          }
          <button onClick={()=>setShowSettings(true)} style={{background:T.border,border:`1px solid ${T.border2}`,width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:14,color:T.textDim,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>⚙</button>
        </div>
      </nav>

      {/* EMAIL VERIFICATION BANNER */}
      {user && !emailVerified && (
        <div style={{position:"fixed",top:58,left:0,right:0,zIndex:99,background:"#3a2a14",borderBottom:"1px solid #6a4a20",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div style={{fontSize:12,color:"#ffd890",flex:1}}>
            ✉️ Verifiera din email för full tillgång
          </div>
          <button onClick={verificationSent ? checkVerification : resendVerification} style={{background:"#e8c97a",border:"none",color:"#0d0d0d",borderRadius:99,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
            {verificationSent ? "Jag har klickat" : "Skicka mail"}
          </button>
        </div>
      )}

      <div style={{position:"relative",zIndex:1,paddingTop:58}}>

        {/* HOME */}
        {screen==="home" && (
          <div style={{maxWidth:540,margin:"0 auto",padding:"28px 16px 20px"}}>
            {/* Goal Setup Modal */}
            {showGoalSetup && <GoalSetup onSave={saveGoal} T={T} isDark={isDark}/>}

            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <div style={{width:42,height:42,borderRadius:"50%",overflow:"hidden",background:T.border,border:`1px solid ${T.border2}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                {profile.avatar ? <img src={profile.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : "👤"}
              </div>
              <div>
                <div style={{fontSize:12,color:T.textFaint}}>Hej,</div>
                <div style={{fontSize:16,fontWeight:700,color:T.text}}>{profile.name||user.email} 👋</div>
              </div>
              <div style={{marginLeft:"auto",fontSize:10,color:T.green,background:isDark?"#0a160a":"#e8f5e8",border:`1px solid ${isDark?"#1a3a1a":"#b8dbb8"}`,borderRadius:99,padding:"3px 10px"}}>☁️ Synkad</div>
            </div>

            {/* Goal + Calorie Banner med TRACKER */}
            {(() => {
              const kcalPct = Math.min(100, (todayKcal / dailyKcal) * 100);
              const kcalLeft = dailyKcal - todayKcal;
              const isOver = todayKcal > dailyKcal;
              const proteinTarget = Math.round(dailyKcal*0.32/4);
              const carbsTarget = Math.round(dailyKcal*0.40/4);
              const fatTarget = Math.round(dailyKcal*0.28/9);
              
              return (
                <div style={{background:T.bg2,border:`1px solid ${fitnessGoal==="deffa"?T.green+"44":T.accent+"44"}`,borderRadius:14,padding:"14px 16px",marginBottom:18}}>
                  {/* Överst: mål + ändra */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:24}}>{fitnessGoal==="deffa"?"🔥":"💪"}</span>
                      <div>
                        <div style={{fontSize:14,fontWeight:700,color:fitnessGoal==="deffa"?T.green:T.accent}}>{fitnessGoal==="deffa"?"Deffa":"Bulka"}</div>
                        <div style={{fontSize:11,color:T.textFaint}}>
                          <span style={{color:isOver?T.red:T.text,fontWeight:600}}>{Math.round(todayKcal).toLocaleString()}</span>
                          <span style={{color:T.textFaint}}> / {dailyKcal.toLocaleString()} kcal</span>
                        </div>
                      </div>
                    </div>
                    <button onClick={()=>setShowGoalSetup(true)} style={{fontSize:11,color:T.textDim,border:`1px solid ${T.border2}`,background:"transparent",borderRadius:99,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}}>Ändra →</button>
                  </div>
                  
                  {/* Progress bar */}
                  <div style={{background:T.border,borderRadius:99,height:6,overflow:"hidden",marginBottom:10}}>
                    <div style={{height:"100%",borderRadius:99,
                      background:isOver?"linear-gradient(90deg,#6dcc6d,#e8c97a,#cc7a7a)":
                                fitnessGoal==="deffa"?"linear-gradient(90deg,#6dcc6d,#4aaa4a)":"linear-gradient(90deg,#e8c97a,#c4a852)",
                      width:`${kcalPct}%`,transition:"width 0.4s"}}></div>
                  </div>
                  
                  {/* Status-text */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,fontSize:10}}>
                    <span style={{color:isOver?T.red:T.green}}>
                      {isOver ? `⚠ ${Math.round(todayKcal - dailyKcal)} över mål` : `${Math.round(kcalLeft)} kcal kvar`}
                    </span>
                    {todayMeals.length > 0 && (
                      <button onClick={undoLastMeal} style={{fontSize:10,color:T.textDim,background:"transparent",border:`1px solid ${T.border2}`,borderRadius:99,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit"}}>
                        ↶ Ångra senaste
                      </button>
                    )}
                  </div>
                  
                  {/* Macros med progress */}
                  <div style={{display:"flex",gap:6}}>
                    {[
                      ["Protein", todayProtein, proteinTarget, T.green],
                      ["Kolhydr.", todayCarbs, carbsTarget, T.blue],
                      ["Fett", todayFat, fatTarget, T.yellow],
                    ].map(([l,v,t,c])=>{
                      const pct = Math.min(100, (v/t)*100);
                      return (
                        <div key={l} style={{flex:1,background:T.bg3,borderRadius:8,padding:"7px 4px",textAlign:"center"}}>
                          <div style={{fontSize:12,fontWeight:700,color:c,marginBottom:2}}>
                            {Math.round(v)}<span style={{fontSize:9,color:T.textFaint,fontWeight:400}}>/{t}g</span>
                          </div>
                          <div style={{background:T.border,borderRadius:99,height:2,overflow:"hidden",marginBottom:3}}>
                            <div style={{height:"100%",borderRadius:99,background:c,width:`${pct}%`,transition:"width 0.4s"}}></div>
                          </div>
                          <div style={{fontSize:8,color:T.textFaint,textTransform:"uppercase"}}>{l}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* VATTENSPÅRNING + STREAK */}
            <div style={{display:"grid",gridTemplateColumns:streakCount > 0 ? "1fr 1fr" : "1fr",gap:10,marginBottom:18}}>
              {/* Vatten */}
              <div style={{background:T.bg2,border:`1px solid ${T.blue}33`,borderRadius:14,padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:20}}>💧</span>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:T.blue}}>Vatten</div>
                      <div style={{fontSize:10,color:T.textFaint}}>{todayWater}/{waterGoal} glas</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    {todayWater > 0 && (
                      <button onClick={removeWater} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.textDim,width:26,height:26,borderRadius:"50%",cursor:"pointer",fontSize:14,padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    )}
                    <button onClick={addWater} disabled={todayWater>=12} style={{background:todayWater>=12?T.border:T.blue,border:"none",color:"#fff",width:26,height:26,borderRadius:"50%",cursor:todayWater>=12?"not-allowed":"pointer",fontSize:14,padding:0,opacity:todayWater>=12?0.3:1,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
                  </div>
                </div>
                {/* Droppar visualisering */}
                <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                  {[...Array(waterGoal)].map((_,i)=>(
                    <div key={i} onClick={()=>{if(i+1>todayWater)addWater();else setTodayWater(i);}} style={{
                      fontSize:18,
                      opacity:i<todayWater?1:0.2,
                      cursor:"pointer",
                      transition:"all 0.2s",
                      filter:i<todayWater?"none":"grayscale(1)"
                    }}>💧</div>
                  ))}
                  {todayWater > waterGoal && [...Array(Math.min(4, todayWater - waterGoal))].map((_,i)=>(
                    <div key={`bonus-${i}`} style={{fontSize:18}}>⭐</div>
                  ))}
                </div>
              </div>
              
              {/* Streak */}
              {streakCount > 0 && (
                <div style={{background:streakCount >= 7 ? (isDark?"linear-gradient(135deg,#2a1a08,#1a1a08)":"linear-gradient(135deg,#ffe8c4,#fff4d8)") : T.bg2,border:`1px solid ${T.accent}44`,borderRadius:14,padding:"12px 14px",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center"}}>
                  <div style={{fontSize:28,marginBottom:2}}>🔥</div>
                  <div style={{fontSize:20,fontWeight:700,color:T.accent,lineHeight:1}}>{streakCount}</div>
                  <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginTop:2}}>
                    {streakCount === 1 ? "dag" : "dagar i rad"}
                  </div>
                  {streakCount >= 7 && (
                    <div style={{fontSize:8,color:T.accent,marginTop:3,fontWeight:700}}>🏆 En vecka!</div>
                  )}
                  {streakCount >= 30 && (
                    <div style={{fontSize:8,color:T.accent,marginTop:3,fontWeight:700}}>💎 MÅNAD!</div>
                  )}
                </div>
              )}
            </div>

            <h2 style={{fontSize:"clamp(18px,4vw,28px)",fontWeight:700,lineHeight:1.1,marginBottom:6,
              background:isDark?"linear-gradient(135deg,#f0f0e0,#e8c97a 55%,#6dcc6d)":"linear-gradient(135deg,#2a2a1a,#b8942a 55%,#4aaa4a)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              Välj kategori.<br/>Bläddra & välj.
            </h2>
            <p style={{fontSize:13,color:T.textFaint,marginBottom:14}}>Swipa höger på det du vill laga. ❤ = sparas som favorit.</p>
            
            {favorites.length > 0 && (
              <button onClick={()=>setShowFavorites(true)} style={{width:"100%",background:isDark?"linear-gradient(135deg,#cc7a7a22,#e8c97a22)":"linear-gradient(135deg,#f8e8e8,#faf0d8)",border:`1px solid ${T.red}44`,borderRadius:12,padding:"12px 16px",cursor:"pointer",fontFamily:"inherit",marginBottom:18,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>💖</span>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.text}}>Mina favoriter</div>
                    <div style={{fontSize:10,color:T.textFaint}}>{favorites.length} sparade recept</div>
                  </div>
                </div>
                <span style={{fontSize:14,color:T.textDim}}>→</span>
              </button>
            )}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
              {CATEGORIES.map(cat=>(
                <button key={cat.id} className="cat-btn" onClick={()=>handleSpin(cat.id)}
                  style={{background:T.bg2,border:`1px solid ${T.border}`,
                    borderRadius:16,padding:"18px 12px",cursor:"pointer",textAlign:"center",fontFamily:"inherit",
                    transition:"all 0.25s"}}>
                  <div style={{fontSize:34,marginBottom:7}}>{cat.emoji}</div>
                  <div style={{fontSize:14,fontWeight:700,color:cat.color,marginBottom:3}}>{cat.label}</div>
                  <div style={{fontSize:10,color:T.textFaint}}>{cat.desc}</div>
                  <div style={{marginTop:9,fontSize:10,color:cat.color,opacity:0.6}}>Bläddra →</div>
                </button>
              ))}
            </div>

            {!isPremium && (
              <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 15px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                  <span style={{fontSize:12,color:T.textFaint}}>Gratis-plan</span>
                  <span style={{fontSize:11,color:freeLeft>0?T.green:T.red}}>{freeLeft>0?`${freeLeft} kvar`:"Uppgradera"}</span>
                </div>
                <div style={{background:T.border,borderRadius:99,height:3,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:99,background:T.green,width:`${(freeUsed/FREE_LIMIT)*100}%`,transition:"width 0.4s"}}/>
                </div>
              </div>
            )}
          </div>
        )}

        {/* PROFILE */}
        {screen==="profile" && (
          <div style={{maxWidth:540,margin:"0 auto",padding:"22px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <h2 style={{fontSize:20,color:"#e8c97a"}}>Min Profil</h2>
              {!editMode
                ? <button onClick={()=>{setEditProfile({...profile});setAvatarPreview(profile.avatar);setEditMode(true);}} style={{fontSize:12,color:"#e8c97a",background:"transparent",border:"1px solid #e8c97a",borderRadius:99,padding:"6px 14px",cursor:"pointer",fontFamily:"inherit"}}>✏️ Redigera</button>
                : <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setEditMode(false)} style={{fontSize:12,color:"#666",background:"transparent",border:"1px solid #333",borderRadius:99,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit"}}>Avbryt</button>
                    <button onClick={saveProfile} disabled={saving} style={{fontSize:12,color:"#0d0d0d",background:"linear-gradient(135deg,#e8c97a,#c4a852)",border:"none",borderRadius:99,padding:"6px 14px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{saving?"Sparar...":"Spara ☁️"}</button>
                  </div>
              }
            </div>

            {/* Avatar */}
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{position:"relative",display:"inline-block"}}>
                <div style={{width:90,height:90,borderRadius:"50%",overflow:"hidden",background:"#1a1a14",border:"2px solid #2a2a1a",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40}}>
                  {(editMode?avatarPreview:profile.avatar) ? <img src={editMode?avatarPreview:profile.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : "👤"}
                </div>
                {editMode && <button onClick={()=>avatarRef.current.click()} style={{position:"absolute",bottom:0,right:0,width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#e8c97a,#c4a852)",border:"none",cursor:"pointer",fontSize:14}}>📷</button>}
                <input ref={avatarRef} type="file" accept="image/*" onChange={handleAvatarChange} style={{display:"none"}}/>
              </div>
              {!editMode && <div style={{marginTop:8,fontSize:15,fontWeight:700,color:"#e8e8e0"}}>{profile.name||"Ange ditt namn"}</div>}
              {!editMode && <div style={{fontSize:11,color:"#555",marginTop:2}}>{user.email}</div>}
            </div>

            {/* Profile fields */}
            <div style={{background:"#0e0e0c",border:"1px solid #1a1a14",borderRadius:16,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:10,color:"#555",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.1em"}}>Personuppgifter</div>
              {editMode ? <>
                <Field label="Namn" value={editProfile.name} onChange={v=>setEditProfile(p=>({...p,name:v}))} placeholder="Ditt namn"/>
                <Field label="Telefon" value={editProfile.phone||""} onChange={v=>setEditProfile(p=>({...p,phone:v}))} type="tel" placeholder="070-000 00 00"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                  <Field label="Ålder" value={editProfile.age||""} onChange={v=>setEditProfile(p=>({...p,age:v}))} type="number" placeholder="25"/>
                  <Field label="Vikt kg" value={editProfile.weight||""} onChange={v=>setEditProfile(p=>({...p,weight:v}))} type="number" placeholder="75"/>
                  <Field label="Längd cm" value={editProfile.height||""} onChange={v=>setEditProfile(p=>({...p,height:v}))} type="number" placeholder="175"/>
                </div>
                <div style={{marginBottom:4}}>
                  <div style={{fontSize:10,color:"#555",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.1em"}}>Mål</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {[["deffa","🔥 Deffa"],["bygga","💪 Bygga"],["hålla","⚖️ Hålla vikt"]].map(([val,lab])=>(
                      <button key={val} onClick={()=>setEditProfile(p=>({...p,goal:val}))} style={{padding:"7px 12px",borderRadius:99,border:"1px solid",fontFamily:"inherit",fontSize:11,cursor:"pointer",borderColor:editProfile.goal===val?"#e8c97a":"#2a2a1a",background:editProfile.goal===val?"#1a1a08":"transparent",color:editProfile.goal===val?"#e8c97a":"#555"}}>{lab}</button>
                    ))}
                  </div>
                </div>
              </> : <>
                {[["Namn",profile.name],["Telefon",profile.phone],["Ålder",profile.age&&profile.age+" år"],["Vikt",profile.weight&&profile.weight+" kg"],["Längd",profile.height&&profile.height+" cm"],["Mål",profile.goal==="deffa"?"🔥 Deffa":profile.goal==="bygga"?"💪 Bygga muskler":"⚖️ Hålla vikt"]].map(([l,v])=>v&&(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #141410"}}>
                    <span style={{fontSize:13,color:"#555"}}>{l}</span>
                    <span style={{fontSize:13,color:"#d0d0c0"}}>{v}</span>
                  </div>
                ))}
                {!profile.name && <div style={{fontSize:13,color:"#333",textAlign:"center",padding:"10px 0"}}>Tryck Redigera för att fylla i din profil</div>}
              </>}
            </div>

            {/* Fitness Goal */}
            <div style={{background:"#0e0e0c",border:"1px solid #1a1a14",borderRadius:16,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:10,color:"#555",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.1em"}}>Tränings mål</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:24}}>{fitnessGoal==="deffa"?"🔥":"💪"}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:fitnessGoal==="deffa"?"#6dcc6d":"#e8c97a"}}>{fitnessGoal==="deffa"?"Deffa":"Bulka"}</div>
                    <div style={{fontSize:12,color:"#555",marginTop:1}}>{dailyKcal.toLocaleString()} kcal / dag</div>
                  </div>
                </div>
                <button onClick={()=>setShowGoalSetup(true)} style={{fontSize:12,color:"#e8e8e0",background:"#1a1a14",border:"1px solid #2a2a1a",borderRadius:99,padding:"6px 14px",cursor:"pointer",fontFamily:"inherit"}}>Ändra</button>
              </div>
            </div>

            {/* Subscription */}
            <div style={{background:"#0e0e0c",border:"1px solid #1a1a14",borderRadius:16,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:10,color:"#555",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.1em"}}>Prenumeration</div>
              {isPremium ? (
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:14,color:"#e8c97a",fontWeight:700}}>✨ Premium aktiv</div>
                    <div style={{fontSize:12,color:"#555",marginTop:2}}>100 kr/mån · Obegränsat</div>
                  </div>
                  <button onClick={async()=>{setIsPremium(false);await saveToCloud({isPremium:false});}} style={{fontSize:11,color:"#cc7a7a",background:"transparent",border:"1px solid #3a1a1a",borderRadius:99,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit"}}>Avsluta</button>
                </div>
              ) : (
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:14,color:"#888"}}>Gratis-plan</div>
                    <div style={{fontSize:12,color:"#444",marginTop:2}}>{freeLeft} recept kvar</div>
                  </div>
                  <button onClick={()=>setPricingOpen(true)} style={{fontSize:12,color:"#0d0d0d",background:"linear-gradient(135deg,#e8c97a,#c4a852)",border:"none",borderRadius:99,padding:"7px 14px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Uppgradera</button>
                </div>
              )}
            </div>

            {/* Payment */}
            <div style={{background:"#0e0e0c",border:"1px solid #1a1a14",borderRadius:16,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:10,color:"#555",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.1em"}}>Betalningssätt</div>
              {savedCard && (
                <div style={{background:"#141410",borderRadius:11,padding:"11px 13px",marginBottom:10,border:"1px solid #2a2a1a",display:"flex",alignItems:"center",gap:11}}>
                  <span style={{fontSize:22}}>💳</span>
                  <div style={{flex:1}}>

              </div>

            </div>

            <div style={{marginBottom:28}}>
              <div style={{fontSize:10,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,paddingLeft:4}}>Prenumeration</div>
              <button onClick={()=>{setShowSettings(false);setPricingOpen(true);}} style={{width:"100%",background:isPremium?(isDark?"#1a1a08":"#faf4e0"):T.bg3,border:`1px solid ${isPremium?(isDark?"#3a3010":"#e0d0a0"):T.border}`,borderRadius:12,padding:"14px 16px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",justifyContent:"space-between",color:T.text}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:20}}>{isPremium?"✨":"💳"}</span>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:isPremium?T.accent:T.text}}>{isPremium?"Premium aktiv":"Uppgradera till Premium"}</div>
                    <div style={{fontSize:11,color:T.textFaint}}>{isPremium?"Obegränsat med recept":"100 kr/mån · Obegränsat"}</div>
                  </div>
                </div>
                <span style={{color:T.textFaint}}>→</span>
              </button>
            </div>

            <div style={{marginBottom:28}}>
              <div style={{fontSize:10,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,paddingLeft:4}}>Konto</div>
              <div style={{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 16px",marginBottom:8}}>
                <div style={{fontSize:11,color:T.textFaint,marginBottom:4}}>Inloggad som</div>
                <div style={{fontSize:13,color:T.text,marginBottom:2}}>{user && user.email}</div>
                <div style={{fontSize:10,color:emailVerified?T.green:T.red,marginTop:4}}>{emailVerified?"✓ Verifierad":"⚠ Ej verifierad"}</div>
              </div>
              <button onClick={()=>{setShowSettings(false);handleLogout();}} style={{width:"100%",background:"transparent",border:`1px solid ${T.border2}`,color:T.red,borderRadius:12,padding:"14px",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600}}>Logga ut</button>
            </div>

            <div style={{textAlign:"center",fontSize:10,color:T.textVeryFaint,marginTop:20}}>FitFuel · v1.0</div>
          </div>
        </div>
      )}

      {/* ONBOARDING WIZARD */}
      {showOnboarding && (() => {
        const steps = ["gender","age","height","weight","activity","goal","summary"];
        const stepId = steps[onboardStep];
        const canNext = 
          (stepId==="gender" && onbGender) ||
          (stepId==="age" && Number(onbAge)>=10 && Number(onbAge)<=100) ||
          (stepId==="height" && Number(onbHeight)>=100 && Number(onbHeight)<=250) ||
          (stepId==="weight" && Number(onbWeight)>=30 && Number(onbWeight)<=250) ||
          (stepId==="activity" && onbActivity) ||
          (stepId==="goal" && onbGoal) ||
          stepId==="summary";
        
        const bmr = calculateBMR(onbGender, onbWeight, onbHeight, onbAge);
        const tdee = calculateTDEE(bmr, onbActivity);
        const targetKcal = calculateTargetKcal(tdee, onbGoal);
        const protein = Math.round(targetKcal * 0.32 / 4);
        const carbs = Math.round(targetKcal * 0.40 / 4);
        const fat = Math.round(targetKcal * 0.28 / 9);
        
        const saveOnboarding = async () => {
          const newProfile = {...profile, gender:onbGender, age:onbAge, height:onbHeight, weight:onbWeight, activity:onbActivity, goal:onbGoal};
          setProfile(newProfile);
          setEditProfile(newProfile);
          setFitnessGoal(onbGoal);
          setDailyKcal(targetKcal);
          await saveToCloud({
            profile: newProfile,
            fitnessGoal: onbGoal,
            dailyKcal: targetKcal,
            onboardingComplete: true
          });
          setShowOnboarding(false);
        };
        
        return (
          <div style={{position:"fixed",inset:0,zIndex:400,background:"#0e0e0c",overflowY:"auto"}}>
            <div style={{maxWidth:480,margin:"0 auto",padding:"40px 20px 120px",minHeight:"100vh"}}>
              <div style={{display:"flex",gap:4,marginBottom:32}}>
                {steps.map((_,i)=>(
                  <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=onboardStep?"#e8c97a":"#2a2a20"}}></div>
                ))}
              </div>

              {stepId==="gender" && (
                <div>
                  <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Steg 1 av 7</div>
                  <h2 style={{fontSize:26,fontWeight:700,color:"#e8e8e0",marginBottom:8}}>Välkommen! 👋</h2>
                  <p style={{fontSize:14,color:"#888",marginBottom:28,lineHeight:1.5}}>Vi behöver lite info för att räkna ut rätt kalorier och makron åt dig.</p>
                  <div style={{fontSize:13,color:"#888",marginBottom:14,fontWeight:600}}>Vilket kön är du?</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <button onClick={()=>setOnbGender("man")} style={{background:onbGender==="man"?"#141410":"transparent",border:onbGender==="man"?"1px solid #e8c97a":"1px solid #1a1a14",borderRadius:14,padding:"28px 16px",cursor:"pointer",fontFamily:"inherit",color:"#e8e8e0"}}>
                      <div style={{fontSize:38,marginBottom:8}}>👨</div>
                      <div style={{fontSize:14,fontWeight:600}}>Man</div>
                    </button>
                    <button onClick={()=>setOnbGender("kvinna")} style={{background:onbGender==="kvinna"?"#141410":"transparent",border:onbGender==="kvinna"?"1px solid #e8c97a":"1px solid #1a1a14",borderRadius:14,padding:"28px 16px",cursor:"pointer",fontFamily:"inherit",color:"#e8e8e0"}}>
                      <div style={{fontSize:38,marginBottom:8}}>👩</div>
                      <div style={{fontSize:14,fontWeight:600}}>Kvinna</div>
                    </button>
                  </div>
                </div>
              )}
              
              {stepId==="age" && (
                <div>
                  <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Steg 2 av 7</div>
                  <h2 style={{fontSize:26,fontWeight:700,color:"#e8e8e0",marginBottom:28}}>Hur gammal är du?</h2>
                  <input type="number" value={onbAge} onChange={e=>setOnbAge(e.target.value)} placeholder="t.ex. 28" style={{width:"100%",background:"#141410",border:"1px solid #2a2a20",borderRadius:12,padding:"18px",fontSize:20,color:"#e8e8e0",textAlign:"center",fontFamily:"inherit"}} />
                  <div style={{fontSize:11,color:"#666",marginTop:8,textAlign:"center"}}>år</div>
                </div>
              )}
              
              {stepId==="height" && (
                <div>
                  <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Steg 3 av 7</div>
                  <h2 style={{fontSize:26,fontWeight:700,color:"#e8e8e0",marginBottom:28}}>Hur lång är du?</h2>
                  <input type="number" value={onbHeight} onChange={e=>setOnbHeight(e.target.value)} placeholder="t.ex. 180" style={{width:"100%",background:"#141410",border:"1px solid #2a2a20",borderRadius:12,padding:"18px",fontSize:20,color:"#e8e8e0",textAlign:"center",fontFamily:"inherit"}} />
                  <div style={{fontSize:11,color:"#666",marginTop:8,textAlign:"center"}}>cm</div>
                </div>
              )}
              
              {stepId==="weight" && (
                <div>
                  <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Steg 4 av 7</div>
                  <h2 style={{fontSize:26,fontWeight:700,color:"#e8e8e0",marginBottom:28}}>Vad väger du?</h2>
                  <input type="number" value={onbWeight} onChange={e=>setOnbWeight(e.target.value)} placeholder="t.ex. 75" style={{width:"100%",background:"#141410",border:"1px solid #2a2a20",borderRadius:12,padding:"18px",fontSize:20,color:"#e8e8e0",textAlign:"center",fontFamily:"inherit"}} />
                  <div style={{fontSize:11,color:"#666",marginTop:8,textAlign:"center"}}>kg</div>
                </div>
              )}
              
              {stepId==="activity" && (
                <div>
                  <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Steg 5 av 7</div>
                  <h2 style={{fontSize:24,fontWeight:700,color:"#e8e8e0",marginBottom:20}}>Hur aktiv är du?</h2>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {ACTIVITY_LEVELS.map(a=>(
                      <button key={a.id} onClick={()=>setOnbActivity(a.id)} style={{background:onbActivity===a.id?"#141410":"transparent",border:onbActivity===a.id?"1px solid #e8c97a":"1px solid #1a1a14",borderRadius:12,padding:"14px 16px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",color:"#e8e8e0",display:"flex",alignItems:"center",gap:12}}>
                        <div style={{fontSize:26}}>{a.emoji}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{a.label}</div>
                          <div style={{fontSize:11,color:"#666"}}>{a.desc}</div>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              )}
              
              {stepId==="goal" && (
                <div>
                  <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Steg 6 av 7</div>
                  <h2 style={{fontSize:26,fontWeight:700,color:"#e8e8e0",marginBottom:20}}>Vad är ditt mål?</h2>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {GOAL_OPTIONS.map(g=>(
                      <button key={g.id} onClick={()=>setOnbGoal(g.id)} style={{background:onbGoal===g.id?"#141410":"transparent",border:onbGoal===g.id?"1px solid #e8c97a":"1px solid #1a1a14",borderRadius:14,padding:"18px 20px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",color:"#e8e8e0",display:"flex",alignItems:"center",gap:14}}>
                        <div style={{fontSize:32}}>{g.emoji}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>{g.label}</div>
                          <div style={{fontSize:12,color:"#666"}}>{g.desc}</div>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              )}
              
              {stepId==="summary" && (
                <div>
                  <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>Steg 7 av 7</div>
                  <h2 style={{fontSize:24,fontWeight:700,color:"#e8e8e0",marginBottom:8}}>Din plan är klar! 🎯</h2>
                  <p style={{fontSize:13,color:"#888",marginBottom:24}}>Baserat på dina uppgifter rekommenderar vi:</p>
                  
                  <div style={{background:"#141410",border:"1px solid #3a3010",borderRadius:16,padding:"24px 20px",marginBottom:16,textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Dagligt kaloriintag</div>
                    <div style={{fontSize:42,fontWeight:700,color:"#e8c97a"}}>{targetKcal}</div>
                    <div style={{fontSize:11,color:"#666",marginTop:2}}>kcal/dag</div>
                  </div>
                  
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
                    <div style={{background:"#141410",border:"1px solid #1a1a14",borderRadius:12,padding:"14px 8px",textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:"#6dcc6d"}}>{protein}g</div>
                      <div style={{fontSize:9,color:"#666",textTransform:"uppercase",marginTop:2}}>Protein</div>
                    </div>
                    <div style={{background:"#141410",border:"1px solid #1a1a14",borderRadius:12,padding:"14px 8px",textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:"#7aa0cc"}}>{carbs}g</div>
                      <div style={{fontSize:9,color:"#666",textTransform:"uppercase",marginTop:2}}>Kolhydr.</div>
                    </div>
                    <div style={{background:"#141410",border:"1px solid #1a1a14",borderRadius:12,padding:"14px 8px",textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:"#c4a852"}}>{fat}g</div>
                      <div style={{fontSize:9,color:"#666",textTransform:"uppercase",marginTop:2}}>Fett</div>
                    </div>
                  </div>
                  
                  <div style={{fontSize:11,color:"#666",textAlign:"center",marginBottom:4}}>BMR: {bmr} kcal · TDEE: {tdee} kcal</div>
                </div>
              )}

              <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"16px 20px 30px",background:"#0e0e0c",borderTop:"1px solid #1a1a14",display:"flex",gap:10,maxWidth:480,margin:"0 auto"}}>
                {onboardStep>0 && (
                  <button onClick={()=>setOnboardStep(onboardStep-1)} style={{flex:1,background:"transparent",border:"1px solid #2a2a20",color:"#888",borderRadius:99,padding:"15px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← Tillbaka</button>
                )}
                {stepId==="summary" ? (
                  <button onClick={saveOnboarding} style={{flex:2,background:"linear-gradient(135deg,#6dcc6d,#4aaa4a)",color:"#080808",border:"none",borderRadius:99,padding:"15px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Kom igång 🚀</button>
                ) : (
                  <button onClick={()=>{if(canNext)setOnboardStep(onboardStep+1);}} disabled={!canNext} style={{flex:2,background:canNext?"linear-gradient(135deg,#e8c97a,#c4a852)":"#2a2a20",color:canNext?"#080808":"#666",border:"none",borderRadius:99,padding:"15px",fontSize:15,fontWeight:700,cursor:canNext?"pointer":"not-allowed",fontFamily:"inherit"}}>Nästa →</button>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {/* RECIPE MODAL */}
      {modalOpen && currentRecipe && (
        <div onClick={()=>setModalOpen(false)} style={{position:"fixed",inset:0,zIndex:200,background:"#0e0e0c",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0e0e0c",width:"100%",maxWidth:580,height:"100vh",overflowY:"auto",padding:"44px 16px 44px"}}>
            <div style={{width:40,height:4,background:"#333",borderRadius:99,margin:"0 auto 14px"}}/>
            
            {/* Stor bild */}
            <div style={{marginBottom:14}}>
              <RecipeImage recipe={currentRecipe} height={200} borderRadius={14} fallbackEmojiSize={80}/>
            </div>
            
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:34}}>{currentRecipe.emoji}</span>
                <div>
                  <h2 style={{fontSize:16,color:"#f0f0e8",margin:"0 0 2px"}}>{currentRecipe.name}</h2>
                  <div style={{fontSize:11,color:"#555"}}>⏱ {currentRecipe.time} min · {currentRecipe.servings}</div>
                  <div style={{fontSize:10,color:"#777",marginTop:1}}>{currentRecipe.tag}</div>
                </div>
              </div>
              <button onClick={()=>setModalOpen(false)} style={{background:"#1a1a18",border:"none",color:"#888",width:27,height:27,borderRadius:"50%",cursor:"pointer",fontSize:13}}>✕</button>
            </div>
            <div style={{display:"flex",gap:5,marginBottom:8}}>
              {[["Protein",scaleNumber(currentRecipe.protein)+"g","#6dcc6d"],["Kolh.",scaleNumber(currentRecipe.carbs)+"g","#7aa0cc"],["Fett",scaleNumber(currentRecipe.fat)+"g","#c4a852"],["kcal",scaleNumber(currentRecipe.kcal),"#cc7a7a"]].map(([l,v,c])=>(
                <div key={l} style={{flex:1,textAlign:"center",background:"rgba(0,0,0,0.4)",borderRadius:7,padding:"5px 3px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:c}}>{v}</div>
                  <div style={{fontSize:8,color:"#444",textTransform:"uppercase"}}>{l}</div>
                </div>
              ))}
            </div>
            {/* Scale indicator */}
            {getScaleFactor() !== 1 && (
              <div style={{background:"#0e1a10",border:"1px solid #2a3a20",borderRadius:10,padding:"7px 12px",marginBottom:11,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{fontSize:11,color:"#6dcc6d"}}>✨ Anpassad efter ditt mål ({dailyKcal.toLocaleString()} kcal)</div>
                <div style={{fontSize:10,color:"#888"}}>{getScaleFactor() > 1 ? "+" : ""}{Math.round((getScaleFactor()-1)*100)}%</div>
              </div>
            )}
            {/* % of daily goal */}
            <div style={{background:"#0e0e0c",border:"1px solid #1a1a14",borderRadius:10,padding:"8px 12px",marginBottom:11,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:11,color:"#555"}}>Andel av ditt dagsmål ({dailyKcal.toLocaleString()} kcal)</div>
              <div style={{fontSize:12,fontWeight:700,color:fitnessGoal==="deffa"?"#6dcc6d":"#e8c97a"}}>{Math.round((scaleNumber(currentRecipe.kcal)/dailyKcal)*100)}%</div>
            </div>
            <div style={{background:"#141410",borderLeft:"3px solid #6dcc6d",borderRadius:"0 9px 9px 0",padding:"9px 12px",marginBottom:11}}>
              <div style={{fontSize:9,color:"#6dcc6d",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.1em"}}>Varför denna rätt?</div>
              <div style={{fontSize:12,color:"#7a8a70",lineHeight:1.6}}>{currentRecipe.why}</div>
            </div>
            <div style={{background:"#141410",borderRadius:11,padding:"12px",marginBottom:13}}>
              <div style={{fontSize:9,color:"#555",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.1em"}}>Ingredienser</div>
              {currentRecipe.ingredients.map(({amount,item})=>(
                <div key={item} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1a1a18"}}>
                  <span style={{fontSize:12,color:"#a0a090"}}>{item}</span>
                  <span style={{fontSize:12,color:"#e8c97a",fontWeight:700}}>{scaleAmount(amount)}</span>
                </div>
              ))}
            </div>
            {locked ? (
              <div style={{background:"#1a1210",border:"1px solid #3a2210",borderRadius:13,padding:"20px",textAlign:"center"}}>
                <div style={{fontSize:28,marginBottom:9}}>🔒</div>
                <div style={{fontSize:15,fontWeight:700,color:"#e8c97a",marginBottom:7}}>Du har använt dina {FREE_LIMIT} gratis recept</div>
                <div style={{fontSize:12,color:"#7a6a50",lineHeight:1.7,marginBottom:16}}>Uppgradera till Premium för obegränsad tillgång.</div>
                <button onClick={()=>{setModalOpen(false);setPricingOpen(true);}} style={{width:"100%",padding:"12px",borderRadius:99,background:"linear-gradient(135deg,#e8c97a,#c4a852)",color:"#0d0d0d",border:"none",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}}>✨ Bli Premium — 100 kr/mån</button>
              </div>
            ) : (
              <>
                <div style={{display:"flex",gap:4,marginBottom:7}}>
                  {currentRecipe.steps.map((_,i)=>(
                    <div key={i} onClick={()=>setRecipeStep(i)} style={{flex:1,height:3,borderRadius:99,cursor:"pointer",background:i<=recipeStep?"#e8c97a":"#2a2a20",transition:"background 0.3s"}}/>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#444",marginBottom:9,textAlign:"right"}}>Steg {recipeStep+1} av {currentRecipe.steps.length}</div>
                <div style={{background:"#141410",border:"1px solid #e8c97a30",borderRadius:13,padding:"15px",marginBottom:9}}>
                  <div style={{fontSize:9,color:"#e8c97a",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.1em"}}>Steg {recipeStep+1}</div>
                  <div style={{fontSize:16,fontWeight:700,color:"#f0f0e8",marginBottom:9}}>{currentRecipe.steps[recipeStep].title}</div>
                  <div style={{fontSize:13,color:"#9a9a88",lineHeight:1.85}}>{currentRecipe.steps[recipeStep].desc}</div>
                </div>
                <div style={{display:"flex",gap:7}}>
                  {recipeStep>0&&<button onClick={()=>setRecipeStep(p=>p-1)} style={{flex:1,padding:"10px",background:"transparent",border:"1px solid #2a2a20",color:"#777",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>← Föregående</button>}
                  {recipeStep<currentRecipe.steps.length-1
                    ?<button onClick={()=>setRecipeStep(p=>p+1)} style={{flex:1,padding:"10px",background:"linear-gradient(135deg,#e8c97a,#c4a852)",color:"#0d0d0d",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>Nästa →</button>
                    :<button onClick={async()=>{await addMealToTracker(currentRecipe);setModalOpen(false);}} style={{flex:1,padding:"10px",background:"linear-gradient(135deg,#4aaa4a,#2a7a2a)",color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>✅ Smaklig måltid!</button>
                  }
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* PRICING MODAL */}
      {pricingOpen && (
        <div onClick={()=>setPricingOpen(false)} style={{position:"fixed",inset:0,zIndex:300,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(12px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0e0e0c",borderTop:"1px solid #2a2a18",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:500,padding:"22px 18px 48px"}}>
            <div style={{width:40,height:4,background:"#333",borderRadius:99,margin:"0 auto 20px"}}/>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:38,marginBottom:8}}>✨</div>
              <h2 style={{fontSize:20,color:"#e8c97a",margin:"0 0 5px"}}>FitFuel Premium</h2>
              <div style={{fontSize:13,color:"#555"}}>Obegränsad tillgång — sparat i molnet</div>
            </div>
            {[["💪","Träningsmat","Proteinrika deffa-recept"],["✨","Lyxhelg","Restaurangkänsla hemma"],["🍽️","Vardag","Snabba vardagsrätter"],["🍓","Efterrätt","Sötsug utan dåligt samvete"],["🔄","Obegränsat","Nytt recept varje gång"],["☁️","Molnsynkat","Fungerar på alla dina enheter"]].map(([icon,title,sub])=>(
              <div key={title} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #1a1a14"}}>
                <span style={{fontSize:18}}>{icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:"#d0d0c0",fontWeight:600}}>{title}</div>
                  <div style={{fontSize:11,color:"#444"}}>{sub}</div>
                </div>
                <span style={{fontSize:14,color:"#6dcc6d"}}>✓</span>
              </div>
            ))}
            <button onClick={activatePremium} style={{marginTop:18,width:"100%",padding:"14px",borderRadius:99,background:"linear-gradient(135deg,#e8c97a,#c4a852)",color:"#0d0d0d",border:"none",fontFamily:"inherit",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 8px 32px rgba(232,201,122,0.3)"}}>
              Starta Premium — 100 kr/mån
            </button>
            <div style={{textAlign:"center",marginTop:10,fontSize:11,color:"#333"}}>Avsluta när som helst</div>
          </div>
        </div>
      )}
    </div>
  );
}

// Wait for Firebase to be ready before rendering
function Root() {
  const [fbReady, setFbReady] = useState(false);
  const [fbError, setFbError] = useState(false);
  useEffect(() => {
    let attempts = 0;
    const check = setInterval(() => {
      attempts++;
      if (window._firebase) { 
        setFbReady(true); 
        clearInterval(check); 
      } else if (attempts > 60) { 
        // After 6 seconds, show error
        setFbError(true);
        clearInterval(check); 
      }
    }, 100);
    return () => clearInterval(check);
  }, []);
  
  if (fbError) return (
    <div style={{minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24,fontFamily:"Georgia,serif"}}>
      <div style={{fontSize:48}}>⚠️</div>
      <div style={{fontSize:16,color:"#e8c97a",fontWeight:700,textAlign:"center"}}>Kunde inte ansluta till molnet</div>
      <div style={{fontSize:13,color:"#555",textAlign:"center",maxWidth:300,lineHeight:1.7}}>
        Kontrollera att du har internetanslutning och ladda om sidan. Om problemet kvarstår, kontakta support.
      </div>
      <button onClick={()=>window.location.reload()} style={{padding:"12px 28px",background:"linear-gradient(135deg,#e8c97a,#c4a852)",color:"#080808",border:"none",borderRadius:99,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif"}}>
        Ladda om →
      </button>
    </div>
  );
  
  if (!fbReady) return (
    <div style={{minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48,animation:"pulse 1.5s ease-in-out infinite"}}>🔥</div>
      <div style={{fontSize:14,color:"#444",fontFamily:"Georgia,serif"}}>Ansluter till molnet...</div>
      <div style={{fontSize:11,color:"#333",fontFamily:"Georgia,serif"}}>leaneats.netlify.app</div>
    </div>
  );
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
