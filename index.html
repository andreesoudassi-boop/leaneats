const CATEGORY_FALLBACK_IMAGES = {
  frukost: "https://images.unsplash.com/photo-1493770348161-369560ae357d?w=800&q=80", // frukost-bord
  lunch: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800&q=80", // lunch-bowl

function getFallbackImage(recipe) {
  // Hitta kategorin via receptets ID-prefix
  const prefix = recipe.id[0];
  const catMap = {'f': 'frukost', 'l': 'lunch', 'd': 'middag', 's': 'mellanmal'};
  const catId = catMap[prefix] || 'lunch';
  return {
    url: CATEGORY_FALLBACK_IMAGES[catId],
    thumb: CATEGORY_FALLBACK_IMAGES[catId],
    photographer: "Unsplash",
    photographerUrl: "https://unsplash.com",
    isFallback: true
  };
}

// Hämta bild för ett recept (med cache + fallback)
async function fetchRecipeImage(recipe) {
  const cache = getImgCache();
  if (cache[recipe.id]) return cache[recipe.id];
  
  const query = recipeToSearchTerm(recipe);
  try {
    const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=3&orientation=landscape&client_id=${UNSPLASH_KEY}`;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      if (data.results && data.results.length > 0) {
        const result = data.results[0];
        const imgData = {
          url: result.urls.regular,
          thumb: result.urls.small,
          photographer: result.user.name,
          photographerUrl: result.user.links.html
        };
        // Spara i cache
        cache[recipe.id] = imgData;
        saveImgCache(cache);
        return imgData;
      }
    }
  } catch(e) {
    console.log("Unsplash error for", recipe.name, e);
  }
  
  // Fallback: kategori-bild (men spara INTE som cache så vi kan försöka igen senare)
  return getFallbackImage(recipe);
}

// Auto-tagga recept baserat på namn + ingredienser
function classifyRecipe(recipe, catId) {
  const text = (recipe.name + " " + JSON.stringify(recipe.ingredients) + " " + (recipe.tag||"")).toLowerCase();
  
  // Protein-typ för alla kategorier
  const types = [];
  if (/kyckling|kalkon/.test(text)) types.push("kyckling");
  if (/nötfärs|oxfilé|biff|köttfärs|nötbog|nötkött|wagyu|chateaubriand|tournedos|ankbröst|anka|lamm|fläsk|hjort|\bkött\b/.test(text)) types.push("kott");
  if (/\blax\b|tonfisk|räkor|torsk|forell|makrill|sardiner|hälleflundra|musslor|ostron|krabba|hummer|pilgrimsmussl|langustin|bläckfisk|sashimi|ceviche|havskräft|stör|gravlax|laxfilé|skaldjur|fisk/.test(text)) types.push("fisk");
  if (/\bägg\b|äggvitor|frittata|omelett|pocherat|speglägg/.test(text)) types.push("agg");
  if (/tofu|tempeh|bönor|kikärt|linser|edamame|halloumi|fetaost|svamp|champinjon|vegan|vegetarisk|grönsak/.test(text)) types.push("veg");
  
  // Om inget matchar, kolla om det är skinka/prosciutto etc
  if (types.length === 0) {
    if (/skinka|prosciutto|parmaskinka|kalkonkorv|kycklingkorv/.test(text)) types.push("kott");
  }
  
  return types.length > 0 ? types : ["veg"];
}

function getRandom(catId, excludeId) {
  const pool = ALL_RECIPES[catId].filter(r => r.id !== excludeId);
  return pool[Math.floor(Math.random() * pool.length)];
}

// ─── BMR / TDEE / MAKRON ──────────────────────────────────────────────────
const ACTIVITY_LEVELS = [
  { id:"sedentary",   label:"Stillasittande",    emoji:"🪑", desc:"Kontorsjobb, inget gym",        mult:1.2  },
  { id:"light",       label:"Lätt aktiv",         emoji:"🚶", desc:"Promenader, 1-2 pass/vecka",    mult:1.375 },
  { id:"moderate",    label:"Aktiv",              emoji:"🏃", desc:"3-5 pass/vecka",                mult:1.55  },
  { id:"active",      label:"Mycket aktiv",       emoji:"💪", desc:"6-7 pass/vecka",                mult:1.725 },
  { id:"very_active", label:"Extremt aktiv",      emoji:"🔥", desc:"Tungt jobb + 2x träning/dag",   mult:1.9   },
];

const GOAL_OPTIONS = [
  { id:"deffa",      label:"Deffa",      emoji:"🔥", desc:"Bränn fett",       kcalDelta:-500 },
  { id:"underhall",  label:"Underhåll",  emoji:"⚖️", desc:"Behåll vikten",    kcalDelta:0    },
  { id:"bulka",      label:"Bulka",      emoji:"💪", desc:"Bygg muskler",     kcalDelta:300  },
];

function calculateBMR(gender, weightKg, heightCm, ageYears) {
  const w = Number(weightKg), h = Number(heightCm), a = Number(ageYears);
  if (!w || !h || !a) return 0;
  const base = 10 * w + 6.25 * h - 5 * a;
  return Math.round(gender === "kvinna" ? base - 161 : base + 5);
}

function calculateTDEE(bmr, activityId) {
  const lvl = ACTIVITY_LEVELS.find(a => a.id === activityId) || ACTIVITY_LEVELS[2];
  return Math.round(bmr * lvl.mult);
}

function calculateTargetKcal(tdee, goalId) {
  const goal = GOAL_OPTIONS.find(g => g.id === goalId) || GOAL_OPTIONS[0];
  return Math.max(1200, Math.min(4000, tdee + goal.kcalDelta));
}

// ─── CONFETTI-komponent ───────────────────────────────────────────────────
function Confetti({ trigger }) {
  const [pieces, setPieces] = React.useState([]);
  
  React.useEffect(() => {
    if (!trigger) return;
    const colors = ["#e8c97a", "#6dcc6d", "#7aa0cc", "#cc7a7a", "#c4a852", "#ff6b6b"];
    const newPieces = [];
    for (let i = 0; i < 50; i++) {
      newPieces.push({
        id: Math.random(),
        left: Math.random() * 100,
        color: colors[Math.floor(Math.random() * colors.length)],
        delay: Math.random() * 0.5,
        duration: 2 + Math.random() * 2,
        size: 6 + Math.random() * 8,
        rotation: Math.random() * 360
      });
    }
    setPieces(newPieces);
    setTimeout(() => setPieces([]), 4000);
  }, [trigger]);
  
  if (pieces.length === 0) return null;
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,overflow:"hidden"}}>
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          left:`${p.left}%`,
          background:p.color,
          width:p.size,
          height:p.size,
          animationDelay:`${p.delay}s`,
          animationDuration:`${p.duration}s`,
          borderRadius: Math.random() > 0.5 ? "50%" : "2px",
          transform:`rotate(${p.rotation}deg)`
        }}/>
      ))}
    </div>
  );
}

function RecipeImage({ recipe, height = 200, borderRadius = 12, fallbackEmojiSize = 80 }) {
  const [imgData, setImgData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [imgFailed, setImgFailed] = React.useState(false);

  React.useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setImgFailed(false);
    setImgData(null);
    // Kolla cache först
    const cache = getImgCache();
    if (cache[recipe.id]) {
      setImgData(cache[recipe.id]);
      setLoading(false);
      return;
    }
    // Hämta från API (eller fallback)
    fetchRecipeImage(recipe).then(data => {
      if (cancelled) return;
      setImgData(data);
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [recipe.id]);

  if (imgData && !imgFailed) {
    return (
      <div style={{position:"relative",width:"100%",height,borderRadius,overflow:"hidden",background:"#1a1a14"}}>
        <img 
          src={imgData.url} 
          alt={recipe.name}
          onError={()=>setImgFailed(true)}
          style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}
        />
        {/* Emoji badge uppe till vänster */}
        <div style={{position:"absolute",top:10,left:10,fontSize:28,background:"rgba(0,0,0,0.6)",borderRadius:"50%",width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)"}}>
          {recipe.emoji}
        </div>
        {/* Fotograf-credit (bara om inte fallback) */}
        {!imgData.isFallback && (
          <div style={{position:"absolute",bottom:6,right:8,fontSize:8,color:"rgba(255,255,255,0.6)",background:"rgba(0,0,0,0.5)",padding:"2px 6px",borderRadius:4,backdropFilter:"blur(4px)"}}>
            📷 {imgData.photographer}
          </div>
        )}
      </div>
    );
  }

  // Fallback: emoji på tonad bakgrund (när laddar eller allt misslyckats)
  return (
    <div style={{width:"100%",height,borderRadius,background:"linear-gradient(135deg,#1a1a18,#0e0e0c)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      {loading ? (
        <div style={{fontSize:24,opacity:0.3}}>⏳</div>
      ) : (
        <div style={{fontSize:fallbackEmojiSize}}>{recipe.emoji}</div>
      )}
    </div>
  );
}

  // ── Lägg till måltid i dagens tracker (använder skalade värden) ──
  const addMealToTracker = async (recipe, mealType = null) => {
    // Auto-välj måltidstyp baserat på tid om ingen anges
    if (!mealType) {
      const hour = new Date().getHours();
      if (hour < 10) mealType = "frukost";
      else if (hour < 14) mealType = "lunch";
      else if (hour < 17) mealType = "mellanmal";
      else mealType = "middag";
    }
    
    const todayStr = new Date().toISOString().split('T')[0];
    // Om ny dag, nolla först
    let baseKcal = todayDate === todayStr ? todayKcal : 0;
    let baseProtein = todayDate === todayStr ? todayProtein : 0;
    let baseCarbs = todayDate === todayStr ? todayCarbs : 0;
    let baseFat = todayDate === todayStr ? todayFat : 0;
    let baseMeals = todayDate === todayStr ? todayMeals : [];
    
    // SKALA receptets värden efter användarens mål
    const factor = dailyKcal / 2000;
    const scaledKcal = Math.round((recipe.kcal || 0) * factor);
    const scaledProtein = Math.round((recipe.protein || 0) * factor);
    const scaledCarbs = Math.round((recipe.carbs || 0) * factor);
    const scaledFat = Math.round((recipe.fat || 0) * factor);
    
    const newKcal = baseKcal + scaledKcal;
    const newProtein = baseProtein + scaledProtein;
    const newCarbs = baseCarbs + scaledCarbs;
    const newFat = baseFat + scaledFat;
    const newMeals = [...baseMeals, {
      id: recipe.id,
      name: recipe.name,
      emoji: recipe.emoji,
      kcal: scaledKcal,
      protein: scaledProtein,
      carbs: scaledCarbs,
      fat: scaledFat,
      mealType: mealType, // NYT: vilken måltid
      time: new Date().toISOString()
    }];
    
    setTodayKcal(newKcal);
    setTodayProtein(newProtein);
    setTodayCarbs(newCarbs);
    setTodayFat(newFat);
    setTodayMeals(newMeals);
    setTodayDate(todayStr);
    
    // 🎊 Trigga konfetti om man just nådde målet!
    if (todayKcal < dailyKcal && newKcal >= dailyKcal) {
      setConfettiTrigger(Date.now());
    }
    // 💖 Trigga hjärt-animation
    setHeartBeat(true);
    setTimeout(() => setHeartBeat(false), 600);
    
    await saveToCloud({
      todayDate: todayStr,
      todayKcal: newKcal,
      todayProtein: newProtein,
      todayCarbs: newCarbs,
      todayFat: newFat,
      todayMeals: newMeals
    });
    await updateStreak();
  };

    // Försök extrahera siffra + enhet från strängen, t.ex. "400g" eller "1 msk" eller "2 st"
    const match = String(amount).match(/^(\d+(?:[.,]\d+)?)\s*(.*)$/);
    if (!match) return amount;
    const num = parseFloat(match[1].replace(",", "."));
    const unit = match[2];
    const scaled = num * factor;
    // Avrunda snyggt
    let rounded;
    if (scaled >= 100) rounded = Math.round(scaled / 10) * 10; // avrunda till 10-tal (430 inte 428)

          {authError && <div style={{fontSize:12,color:"#cc7a7a",marginBottom:12,textAlign:"center",background:"#1a0a0a",padding:"8px",borderRadius:8}}>{authError}</div>}

            {authMode==="login"
              ?<span>Inget konto? <span style={{color:"#e8c97a",cursor:"pointer"}} onClick={()=>{setAuthMode("signup");setAuthError("");}}>Skapa ett</span></span>
              :<span>Har konto? <span style={{color:"#e8c97a",cursor:"pointer"}} onClick={()=>{setAuthMode("login");setAuthError("");}}>Logga in</span></span>
            }
          </div>
        </div>
      </div>

  );

  // ── Main app ─────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"Georgia,serif",color:T.text,paddingBottom:90}}>
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",background:`radial-gradient(ellipse at 50% 0%,${T.gradStart} 0%,transparent 55%)`}}/>

        <div style={{display:"flex",alignItems:"center",gap:9}}>
          {/* LE-ikon */}

            width:32,height:32,borderRadius:8,

          </div>
          <span style={{fontSize:17,fontWeight:700,letterSpacing:"0.02em",background:"linear-gradient(135deg,#ff6b35,#ff3366)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>LeanEats</span>

          </div>

            {verificationSent ? "Jag har klickat" : "Skicka mail"}
          </button>
        </div>

      <div style={{position:"relative",zIndex:1,paddingTop:58}}>

        {/* HOME */}
        {screen==="home" && (
          <div className="screen-enter" style={{maxWidth:540,margin:"0 auto",padding:"28px 16px 20px"}}>
            {/* Goal Setup Modal */}
            {showGoalSetup && <GoalSetup onSave={saveGoal} T={T} isDark={isDark}/>}

              <div style={{width:42,height:42,borderRadius:"50%",overflow:"hidden",background:T.border,border:`1px solid ${T.border2}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                {profile.avatar ? <img src={profile.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : "👤"}
              </div>
              <div>
                <div style={{fontSize:12,color:T.textFaint}}>Hej,</div>
                <div style={{fontSize:16,fontWeight:700,color:T.text}}>{profile.name||user.email} 👋</div>
              </div>
              <div style={{marginLeft:"auto",fontSize:10,color:T.green,background:isDark?"#0a160a":"#e8f5e8",border:`1px solid ${isDark?"#1a3a1a":"#b8dbb8"}`,borderRadius:99,padding:"3px 10px"}}>☁️ Synkad</div>
            </div>

            {/* Goal + Calorie Banner med TRACKER */}
            {(() => {
              const kcalPct = Math.min(100, (todayKcal / dailyKcal) * 100);
              const kcalLeft = dailyKcal - todayKcal;
              const isOver = todayKcal > dailyKcal;
              const proteinTarget = Math.round(dailyKcal*0.32/4);
              const carbsTarget = Math.round(dailyKcal*0.40/4);
              const fatTarget = Math.round(dailyKcal*0.28/9);
              
              return (
                <div style={{background:T.bg2,border:`1px solid ${fitnessGoal==="deffa"?T.green+"44":T.accent+"44"}`,borderRadius:14,padding:"14px 16px",marginBottom:18}}>
                  {/* Överst: mål + ändra */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:24}}>{fitnessGoal==="deffa"?"🔥":"💪"}</span>
                      <div>
                        <div style={{fontSize:14,fontWeight:700,color:fitnessGoal==="deffa"?T.green:T.accent}}>{fitnessGoal==="deffa"?"Deffa":"Bulka"}</div>
                        <div style={{fontSize:11,color:T.textFaint}}>
                          <span style={{color:isOver?T.red:T.text,fontWeight:600}}>{Math.round(todayKcal).toLocaleString()}</span>
                          <span style={{color:T.textFaint}}> / {dailyKcal.toLocaleString()} kcal</span>
                        </div>
                      </div>
                    </div>
                    <button onClick={()=>setShowGoalSetup(true)} style={{fontSize:11,color:T.textDim,border:`1px solid ${T.border2}`,background:"transparent",borderRadius:99,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}}>Ändra →</button>
                  </div>
                  
                  {/* Progress bar */}
                  <div className="progress-shimmer" style={{background:T.border,borderRadius:99,height:6,overflow:"hidden",marginBottom:10}}>
                    <div style={{height:"100%",borderRadius:99,
                      background:isOver?"linear-gradient(90deg,#6dcc6d,#e8c97a,#cc7a7a)":
                                fitnessGoal==="deffa"?"linear-gradient(90deg,#6dcc6d,#4aaa4a)":"linear-gradient(90deg,#e8c97a,#c4a852)",
                      width:`${kcalPct}%`,transition:"width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)"}}></div>
                  </div>
                  
                  {/* Status-text */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,fontSize:10}}>
                    <span style={{color:isOver?T.red:T.green}}>
                      {isOver ? `⚠ ${Math.round(todayKcal - dailyKcal)} över mål` : `${Math.round(kcalLeft)} kcal kvar`}
                    </span>
                    {todayMeals.length > 0 && (
                      <button onClick={undoLastMeal} style={{fontSize:10,color:T.textDim,background:"transparent",border:`1px solid ${T.border2}`,borderRadius:99,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit"}}>
                        ↶ Ångra senaste
                      </button>
                    )}
                  </div>
                  
                  {/* Macros med progress */}
                  <div style={{display:"flex",gap:6}}>
                    {[
                      ["Protein", todayProtein, proteinTarget, T.green],
                      ["Kolhydr.", todayCarbs, carbsTarget, T.blue],
                      ["Fett", todayFat, fatTarget, T.yellow],
                    ].map(([l,v,t,c])=>{
                      const pct = Math.min(100, (v/t)*100);
                      return (
                        <div key={l} style={{flex:1,background:T.bg3,borderRadius:8,padding:"7px 4px",textAlign:"center"}}>
                          <div style={{fontSize:12,fontWeight:700,color:c,marginBottom:2}}>
                            {Math.round(v)}<span style={{fontSize:9,color:T.textFaint,fontWeight:400}}>/{t}g</span>
                          </div>
                          <div style={{background:T.border,borderRadius:99,height:2,overflow:"hidden",marginBottom:3}}>
                            <div style={{height:"100%",borderRadius:99,background:c,width:`${pct}%`,transition:"width 0.4s"}}></div>
                          </div>
                          <div style={{fontSize:8,color:T.textFaint,textTransform:"uppercase"}}>{l}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* SKANNER + MINA RÄTTER - LIFESUM-KILLERS! */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {/* Skanner-knapp */}
              <button onClick={()=>{setShowScanner(true);setScannerProduct(null);setScannerInput("");setScannerError("");}} className="press-feedback" style={{
                background:`linear-gradient(135deg,${T.accent},${T.yellow})`,
                border:"none",
                borderRadius:14,
                padding:"14px 12px",
                cursor:"pointer",
                fontFamily:"inherit",
                textAlign:"left",
                boxShadow:`0 4px 16px ${T.accent}33`
              }}>
                <div style={{fontSize:28,marginBottom:4}}>🔍</div>
                <div style={{fontSize:13,fontWeight:700,color:"#0d0d0d"}}>Logga mat</div>
                <div style={{fontSize:10,color:"#0d0d0d",opacity:0.7,fontWeight:500,marginTop:2}}>Skanna · Sök · Senaste</div>
              </button>
              
              {/* Mina rätter-knapp */}
              <button onClick={()=>setShowMyMeals(true)} className="press-feedback" style={{
                background:`linear-gradient(135deg,${T.green},#4aaa4a)`,
                border:"none",
                borderRadius:14,
                padding:"14px 12px",
                cursor:"pointer",
                fontFamily:"inherit",
                textAlign:"left",
                boxShadow:`0 4px 16px ${T.green}55`
              }}>
                <div style={{fontSize:28,marginBottom:4}}>🍳</div>
                <div style={{fontSize:13,fontWeight:700,color:"#0d0d0d"}}>Mina rätter{myMeals.length > 0 ? ` (${myMeals.length})` : ""}</div>
                <div style={{fontSize:10,color:"#0d0d0d",opacity:0.7,fontWeight:500,marginTop:2}}>Skapa egna måltider</div>
              </button>

            {/* VATTENSPÅRNING + STREAK */}
            <div style={{display:"grid",gridTemplateColumns:streakCount > 0 ? "1fr 1fr" : "1fr",gap:10,marginBottom:18}}>
              {/* Vatten */}
              <div style={{background:T.bg2,border:`1px solid ${T.blue}33`,borderRadius:14,padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:20}}>💧</span>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:T.blue}}>Vatten</div>
                      <div style={{fontSize:10,color:T.textFaint}}>{todayWater}/{waterGoal} glas</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    {todayWater > 0 && (
                      <button onClick={removeWater} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.textDim,width:26,height:26,borderRadius:"50%",cursor:"pointer",fontSize:14,padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    )}
                    <button onClick={addWater} disabled={todayWater>=12} style={{background:todayWater>=12?T.border:T.blue,border:"none",color:"#fff",width:26,height:26,borderRadius:"50%",cursor:todayWater>=12?"not-allowed":"pointer",fontSize:14,padding:0,opacity:todayWater>=12?0.3:1,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
                  </div>
                </div>
                {/* Droppar visualisering */}
                <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                  {[...Array(waterGoal)].map((_,i)=>(
                    <div key={i} className="water-drop" onClick={()=>{if(i+1>todayWater)addWater();else setTodayWater(i);}} style={{
                      fontSize:18,
                      opacity:i<todayWater?1:0.2,
                      cursor:"pointer",
                      filter:i<todayWater?"none":"grayscale(1)",
                      animation: i === todayWater - 1 ? "waterFill 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)" : "none"
                    }}>💧</div>
                  ))}
                  {todayWater > waterGoal && [...Array(Math.min(4, todayWater - waterGoal))].map((_,i)=>(
                    <div key={`bonus-${i}`} style={{fontSize:18}}>⭐</div>
                  ))}
                </div>
              </div>
              
              {/* Streak */}
              {streakCount > 0 && (
                <div className={streakCount >= 7 ? "streak-milestone" : ""} style={{background:streakCount >= 7 ? (isDark?"linear-gradient(135deg,#2a1a08,#1a1a08)":"linear-gradient(135deg,#ffe8c4,#fff4d8)") : T.bg2,border:`1px solid ${T.accent}44`,borderRadius:14,padding:"12px 14px",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center"}}>

                  <div style={{fontSize:20,fontWeight:700,color:T.accent,lineHeight:1}}>{streakCount}</div>
                  <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginTop:2}}>

                    <div style={{fontSize:8,color:T.accent,marginTop:3,fontWeight:700}}>🏆 En vecka!</div>
                  )}
                  {streakCount >= 30 && (
                    <div style={{fontSize:8,color:T.accent,marginTop:3,fontWeight:700}}>💎 MÅNAD!</div>
                  )}
                </div>
              )}
            </div>

            {/* MYFITNESSPAL-STIL MÅLTIDER */}
            {(() => {
              const MEAL_TYPES = [
                {id:"frukost", label:"FRUKOST", emoji:"🌅", color:T.yellow},
                {id:"lunch", label:"LUNCH", emoji:"☀️", color:T.blue},
                {id:"middag", label:"MIDDAG", emoji:"🍽", color:T.accent},
                {id:"mellanmal", label:"MELLANMÅL", emoji:"🥜", color:T.green}
              ];
              
              return (
                <div style={{marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <h3 style={{fontSize:13,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>📔 Dagens dagbok</h3>
                    <span style={{fontSize:11,color:T.textFaint}}>
                      {new Date().toLocaleDateString("sv-SE", {weekday:"long", day:"numeric", month:"short"})}
                    </span>
                  </div>
                  
                  {MEAL_TYPES.map(mt => {
                    const mealsInThis = todayMeals.filter(m => m.mealType === mt.id);
                    const mealKcal = mealsInThis.reduce((s,m) => s+(m.kcal||0), 0);
                    const mealProtein = mealsInThis.reduce((s,m) => s+(m.protein||0), 0);
                    const mealCarbs = mealsInThis.reduce((s,m) => s+(m.carbs||0), 0);
                    const mealFat = mealsInThis.reduce((s,m) => s+(m.fat||0), 0);
                    const totalGrams = mealProtein + mealCarbs + mealFat;
                    const proteinPct = totalGrams > 0 ? Math.round((mealProtein*4 / mealKcal) * 100) || 0 : 0;
                    const carbsPct = totalGrams > 0 ? Math.round((mealCarbs*4 / mealKcal) * 100) || 0 : 0;
                    const fatPct = totalGrams > 0 ? Math.round((mealFat*9 / mealKcal) * 100) || 0 : 0;
                    const isEmpty = mealsInThis.length === 0;
                    
                    return (
                      <div key={mt.id} className="card-enter" style={{
                        background:T.bg2,
                        border:`1px solid ${isEmpty ? T.border : mt.color+"33"}`,
                        borderRadius:14,
                        padding:"14px 16px",
                        marginBottom:10,
                        opacity:isEmpty ? 0.6 : 1
                      }}>
                        {/* Header: meal type + total */}
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:isEmpty ? 0 : 10}}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <span style={{fontSize:22}}>{mt.emoji}</span>
                            <div>
                              <div style={{fontSize:13,fontWeight:700,color:mt.color,letterSpacing:"0.05em"}}>{mt.label}</div>
                              <div style={{fontSize:10,color:T.textFaint}}>
                                {mealsInThis.length === 0 ? "Inget loggat" : 
                                 mealsInThis.length === 1 ? "1 måltid" : 
                                 `${mealsInThis.length} måltider`}
                              </div>
                            </div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:18,fontWeight:700,color:mt.color}}>{Math.round(mealKcal)}</div>
                            <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase"}}>kcal</div>
                          </div>
                        </div>

                        {/* Procent-bar (Protein/Kolh/Fett) */}
                        {!isEmpty && totalGrams > 0 && (
                          <>
                            <div style={{display:"flex",height:4,borderRadius:99,overflow:"hidden",marginBottom:8}}>
                              <div style={{width:`${proteinPct}%`,background:T.green,transition:"width 0.4s"}}></div>
                              <div style={{width:`${carbsPct}%`,background:T.blue,transition:"width 0.4s"}}></div>
                              <div style={{width:`${fatPct}%`,background:T.yellow,transition:"width 0.4s"}}></div>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:10}}>
                              <span style={{color:T.green}}><strong>{proteinPct}%</strong> ({Math.round(mealProtein)}g) Protein</span>
                              <span style={{color:T.blue}}><strong>{carbsPct}%</strong> ({Math.round(mealCarbs)}g) Kolh</span>
                              <span style={{color:T.yellow}}><strong>{fatPct}%</strong> ({Math.round(mealFat)}g) Fett</span>
                            </div>
                          </>
                        )}

                        {/* Lista av enskilda måltider */}
                        {!isEmpty && (
                          <div>
                            {mealsInThis.map((meal, mealIdx) => {
                              const realIdx = todayMeals.findIndex(m => m === meal);
                              const mealKey = meal.id || meal.time;
                              const coachComment = mealComments[mealKey];
                              return (
                                <div key={mealIdx} style={{
                                  display:"flex",
                                  justifyContent:"space-between",
                                  alignItems:"center",
                                  padding:"8px 0",
                                  borderTop:`1px solid ${T.border}`,
                                  fontSize:12
                                }}>
                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{color:T.text,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                                      {meal.emoji && <span style={{marginRight:6}}>{meal.emoji}</span>}
                                      {meal.name}
                                      {coachComment && (
                                        <button onClick={()=>setShowMealComment({...coachComment, mealName:meal.name, mealEmoji:meal.emoji})} style={{
                                          background:T.green+"33",
                                          border:`1px solid ${T.green}`,
                                          borderRadius:99,
                                          padding:"1px 6px",
                                          fontSize:9,
                                          color:T.green,
                                          marginLeft:6,
                                          cursor:"pointer",
                                          fontFamily:"inherit",
                                          fontWeight:700
                                        }}>💬 Coach</button>
                                      )}
                                    </div>
                                    <div style={{color:T.textFaint,fontSize:10,marginTop:2}}>
                                      P: {Math.round(meal.protein||0)}g · K: {Math.round(meal.carbs||0)}g · F: {Math.round(meal.fat||0)}g
                                    </div>
                                  </div>
                                  <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,marginLeft:8}}>

        const typeList = PROTEIN_TYPES;
        // Lokal state för multi-select — använder proteinFilter som state

        const toggleType = (typeId) => {
          if (typeId === "all") {

            return;

          // Välj specifik: ta bort "all" om den finns
          let next = current.filter(x => x !== "all");
          if (next.includes(typeId)) {
            next = next.filter(x => x !== typeId);
          } else {
            next = [...next, typeId];
          }
          if (next.length === 0) next = ["all"];
          setProteinFilter(next);

        // Räkna hur många recept som matchar CURRENT val

        return (

      })()}

                border:`1px solid ${T.border2}`,

                cursor:"pointer",
                fontFamily:"inherit",

              <button onClick={saveMealComment} className="press-feedback" style={{

            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:48,marginBottom:8}}>💬</div>
              <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Från {showMealComment.coachName}</div>
              <div style={{fontSize:14,color:T.text,fontWeight:600,marginTop:4}}>Om: {showMealComment.mealEmoji} {showMealComment.mealName}</div>

            <div style={{
              background:T.green+"11",
              border:`1px solid ${T.green}44`,

      {/* COACH SER KLIENTENS DAGBOK */}
      {viewingClientDiary && (
        <div className="modal-enter" style={{position:"fixed",inset:0,zIndex:335,background:T.bg,overflowY:"auto"}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <button onClick={()=>setViewingClientDiary(null)} style={{background:T.bg2,border:"none",color:T.textDim,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>

                // Hitta uppdaterad klient och återinitiera vyn

                  {Math.round(viewingClientDiary.todayKcal)}

                <div style={{fontSize:11,color:T.textFaint,marginTop:4,textTransform:"uppercase",letterSpacing:"0.1em"}}>

                </div>
                <div style={{textAlign:"center",background:T.bg3,borderRadius:10,padding:"8px"}}>
                  <div style={{fontSize:14,fontWeight:700,color:T.yellow}}>{Math.round(viewingClientDiary.todayFat || 0)}g</div>
                  <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase"}}>Fett</div>

                  <div key={mt.id} style={{

                        <div>
                          <div style={{fontSize:13,fontWeight:700,color:mt.color}}>{mt.label}</div>

                      </div>

                        <div style={{fontSize:16,fontWeight:700,color:T.text}}>{totalKcal}</div>

                    {mtMeals.length === 0 ? (

                          <div key={i} style={{
                            padding:"8px 0",

                              <div style={{fontSize:12,fontWeight:600,color:mt.color,marginLeft:10,marginRight:8}}>{m.kcal}</div>

                                background:hasComment ? T.green+"33" : T.bg3,
                                border:`1px solid ${hasComment ? T.green : T.border2}`,

            {/* VECKOSTATISTIK */}

              const avgKcal = Math.round(last7.reduce((s,d)=>s+(d.kcal||0),0)/last7.length);
              const daysReached = last7.filter(d=>d.kcal >= (d.goal||viewingClientDiary.dailyKcal)*0.9).length;
              const maxKcal = Math.max(...last7.map(d=>d.kcal||0), viewingClientDiary.dailyKcal);
              
              return (
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginTop:14,marginBottom:14}}>

                    <div style={{background:T.bg3,borderRadius:10,padding:"10px",textAlign:"center"}}>

                        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>

                            width:"100%",

                    <div>
                      <div style={{fontSize:24,fontWeight:700,color:T.text}}>{current.weight}<span style={{fontSize:14,color:T.textFaint,marginLeft:4}}>kg</span></div>

                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:18,fontWeight:700,color:diff < 0 ? T.green : diff > 0 ? T.red : T.textFaint}}>

                      </div>
                      <div style={{fontSize:10,color:T.textFaint}}>Sedan start</div>
                    </div>
                  </div>
                  <div style={{fontSize:10,color:T.textFaint}}>{log.length} mätningar loggade</div>

            {/* "Redigera plan"-knapp i botten för snabbåtkomst */}

              const c = viewingClientDiary;

                kcal: c.dailyKcal || 2000,

                goal: c.goal || "deffa",

              setViewingClientDiary(null);
            }} className="press-feedback" style={{
              width:"100%",
              background:`linear-gradient(135deg,${T.blue},${T.blue}cc)`,
              color:"#fff",
              border:"none",
              borderRadius:99,
              padding:"14px",
              fontSize:14,
              fontWeight:700,
              cursor:"pointer",
              fontFamily:"inherit",
              marginBottom:8,
              boxShadow:`0 4px 16px ${T.blue}66`
            }}>✏️ Redigera plan för {viewingClientDiary.name.split(" ")[0]}</button>
          </div>
        </div>

      {editingClient && isCoach && (
        <div className="modal-enter" style={{position:"fixed",inset:0,zIndex:350,background:T.bg,overflowY:"auto"}}>
          <div style={{maxWidth:540,margin:"0 auto",padding:"44px 16px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>

              <div style={{fontSize:18,fontWeight:700,color:T.blue}}>✏️ Redigera klient</div>
              <div style={{width:36}}></div>
            </div>

            {/* Klientinfo */}
            <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:700,color:T.text,marginBottom:6}}>{editingClient.name}</div>
              <div style={{fontSize:12,color:T.textDim,marginBottom:10}}>{editingClient.email}</div>
              {(editingClient.weight || editingClient.height || editingClient.age) && (
                <div style={{display:"flex",gap:12,fontSize:11,color:T.textFaint}}>
                  {editingClient.age && <span>📅 {editingClient.age} år</span>}
