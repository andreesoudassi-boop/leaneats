                  {editingClient.height && <span>📏 {editingClient.height} cm</span>}
                </div>
              )}
              {(editingClient.cardioHours > 0 || editingClient.strengthSessions > 0) && (
                <div style={{display:"flex",gap:12,fontSize:11,color:T.textFaint,marginTop:6}}>
                  {editingClient.cardioHours > 0 && <span>🏃 {editingClient.cardioHours} h kondition/v</span>}
                  {editingClient.strengthSessions > 0 && <span>🏋️ {editingClient.strengthSessions} pass/v</span>}
                </div>
              )}
            </div>

            {/* MÅL */}
            <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:11,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12,fontWeight:700}}>Mål</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[
                  {id:"deffa", emoji:"🔥", label:"Deffa", color:T.green},
                  {id:"halla", emoji:"⚖️", label:"Hålla", color:T.blue},
                  {id:"bulka", emoji:"💪", label:"Bulka", color:T.accent}
                ].map(g=>(
                  <button key={g.id} onClick={()=>setClientEdits({...clientEdits, goal:g.id})} style={{padding:"12px 6px",background:clientEdits.goal===g.id?g.color+"22":T.bg3,border:`1px solid ${clientEdits.goal===g.id?g.color:T.border}`,borderRadius:10,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
                    <div style={{fontSize:22,marginBottom:4}}>{g.emoji}</div>
                    <div style={{fontSize:12,fontWeight:700,color:clientEdits.goal===g.id?g.color:T.text}}>{g.label}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* KALORIER */}
            <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:11,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Kalorier per dag</div>
                <div style={{fontSize:24,fontWeight:700,color:T.accent}}>{clientEdits.kcal} <span style={{fontSize:12,color:T.textFaint}}>kcal</span></div>
              </div>
              <input type="range" min="1000" max="5000" step="50" value={clientEdits.kcal} onChange={e=>setClientEdits({...clientEdits, kcal:parseInt(e.target.value)})}
                style={{width:"100%",height:6,borderRadius:99,appearance:"none",background:`linear-gradient(90deg, ${T.accent} ${((clientEdits.kcal-1000)/4000)*100}%, ${T.border2} ${((clientEdits.kcal-1000)/4000)*100}%)`,outline:"none",cursor:"pointer",marginBottom:8}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.textFaint,marginBottom:8}}>
                <span>1 000</span><span>5 000</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                {[1500, 2000, 2500, 3000].map(p=>(
                  <button key={p} onClick={()=>setClientEdits({...clientEdits, kcal:p})} style={{padding:"6px",background:clientEdits.kcal===p?T.accent+"22":T.bg3,border:`1px solid ${clientEdits.kcal===p?T.accent:T.border2}`,borderRadius:99,cursor:"pointer",fontFamily:"inherit",fontSize:11,color:clientEdits.kcal===p?T.accent:T.textDim,fontWeight:600}}>{p}</button>
                ))}
              </div>
            </div>

            {/* MAKROS */}
            <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:11,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:6,fontWeight:700}}>Makros</div>
              <div style={{fontSize:11,color:T.textFaint,marginBottom:14}}>Sätt 0 för auto-räkning från kalorier</div>
              
              {/* Protein */}
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:13,color:T.green,fontWeight:600}}>🥩 Protein</span>
                  <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                    <input type="number" value={clientEdits.protein} onChange={e=>setClientEdits({...clientEdits, protein:parseInt(e.target.value)||0})} style={{width:60,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:8,padding:"6px 10px",fontSize:14,color:T.text,fontFamily:"inherit",outline:"none",textAlign:"right"}}/>
                    <span style={{fontSize:12,color:T.textFaint}}>g</span>
                  </div>
                </div>
                <input type="range" min="0" max="400" step="5" value={clientEdits.protein} onChange={e=>setClientEdits({...clientEdits, protein:parseInt(e.target.value)})}
                  style={{width:"100%",height:4,borderRadius:99,appearance:"none",background:`linear-gradient(90deg, ${T.green} ${(clientEdits.protein/400)*100}%, ${T.border2} ${(clientEdits.protein/400)*100}%)`,outline:"none",cursor:"pointer"}}/>
              </div>

              {/* Kolhydrater */}
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:13,color:T.blue,fontWeight:600}}>🍞 Kolhydrater</span>
                  <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                    <input type="number" value={clientEdits.carbs} onChange={e=>setClientEdits({...clientEdits, carbs:parseInt(e.target.value)||0})} style={{width:60,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:8,padding:"6px 10px",fontSize:14,color:T.text,fontFamily:"inherit",outline:"none",textAlign:"right"}}/>
                    <span style={{fontSize:12,color:T.textFaint}}>g</span>
                  </div>
                </div>
                <input type="range" min="0" max="600" step="5" value={clientEdits.carbs} onChange={e=>setClientEdits({...clientEdits, carbs:parseInt(e.target.value)})}
                  style={{width:"100%",height:4,borderRadius:99,appearance:"none",background:`linear-gradient(90deg, ${T.blue} ${(clientEdits.carbs/600)*100}%, ${T.border2} ${(clientEdits.carbs/600)*100}%)`,outline:"none",cursor:"pointer"}}/>
              </div>

              {/* Fett */}
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:13,color:T.yellow,fontWeight:600}}>🥑 Fett</span>
                  <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                    <input type="number" value={clientEdits.fat} onChange={e=>setClientEdits({...clientEdits, fat:parseInt(e.target.value)||0})} style={{width:60,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:8,padding:"6px 10px",fontSize:14,color:T.text,fontFamily:"inherit",outline:"none",textAlign:"right"}}/>
                    <span style={{fontSize:12,color:T.textFaint}}>g</span>
                  </div>
                </div>
                <input type="range" min="0" max="200" step="5" value={clientEdits.fat} onChange={e=>setClientEdits({...clientEdits, fat:parseInt(e.target.value)})}
                  style={{width:"100%",height:4,borderRadius:99,appearance:"none",background:`linear-gradient(90deg, ${T.yellow} ${(clientEdits.fat/200)*100}%, ${T.border2} ${(clientEdits.fat/200)*100}%)`,outline:"none",cursor:"pointer"}}/>
              </div>

              {/* Kollkalorier */}
              {(clientEdits.protein > 0 && clientEdits.carbs > 0 && clientEdits.fat > 0) && (() => {
                const totalKcal = clientEdits.protein*4 + clientEdits.carbs*4 + clientEdits.fat*9;
                const diff = totalKcal - clientEdits.kcal;
                const isOk = Math.abs(diff) < 100;
                return (
                  <div style={{marginTop:12,padding:"10px 12px",background:isOk?T.green+"15":T.red+"15",border:`1px solid ${isOk?T.green:T.red}44`,borderRadius:8,fontSize:11,color:isOk?T.green:T.red,fontWeight:600,textAlign:"center"}}>
                    {isOk ? "✅" : "⚠️"} Makros = {totalKcal} kcal {!isOk && `(${diff > 0 ? "+" : ""}${diff} kcal från kalorimål)`}
                  </div>
                );
              })()}
            </div>

            {/* COACH-ANTECKNING */}
            <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:11,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:12,fontWeight:700}}>💬 Anteckning till klient</div>
              <textarea
                value={clientEdits.note}
                onChange={e=>setClientEdits({...clientEdits, note:e.target.value})}
                placeholder="T.ex: 'Fokus på protein denna vecka. Hör av dig om du har frågor!'"
                style={{width:"100%",minHeight:80,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:10,padding:"12px",fontSize:13,color:T.text,fontFamily:"inherit",outline:"none",resize:"vertical"}}
              />
            </div>

            {/* SPARA-knappar */}
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:10}}>
              <button onClick={()=>setEditingClient(null)} style={{background:T.bg3,border:`1px solid ${T.border2}`,color:T.text,padding:"14px 20px",borderRadius:99,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Avbryt</button>
              <button onClick={saveClientEdits} className="press-feedback" style={{background:`linear-gradient(135deg,${T.blue},${T.green})`,color:"#fff",border:"none",borderRadius:99,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",boxShadow:`0 4px 16px ${T.blue}66`}}>
                💾 Spara ändringar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* MINA RÄTTER MODAL - listvy */}
      {showMyMeals && (
        <div className="modal-enter" style={{position:"fixed",inset:0,zIndex:340,background:T.bg,overflowY:"auto"}}>
          <div style={{maxWidth:540,margin:"0 auto",padding:"44px 16px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <button onClick={()=>setShowMyMeals(false)} style={{background:T.bg2,border:"none",color:T.textDim,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
              <div style={{fontSize:18,fontWeight:700,color:T.green}}>🍳 Mina rätter</div>
              <div style={{width:36}}></div>
            </div>

            {/* Måltidstyp-väljare */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontWeight:700}}>📔 Logga till:</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                {[
                  {id:"frukost",emoji:"🌅",label:"Frukost",color:T.yellow},
                  {id:"lunch",emoji:"☀️",label:"Lunch",color:T.blue},
                  {id:"middag",emoji:"🍽",label:"Middag",color:T.accent},
                  {id:"mellanmal",emoji:"🥜",label:"Mellanmål",color:T.green}
                ].map(mt=>(
                  <button key={mt.id} onClick={()=>setSelectedMealType(mt.id)} className="press-feedback" style={{
                    padding:"10px 4px",
                    background:selectedMealType===mt.id ? mt.color+"22" : T.bg3,
                    border:`1px solid ${selectedMealType===mt.id ? mt.color : T.border}`,
                    borderRadius:10,
                    cursor:"pointer",
                    fontFamily:"inherit",
                    textAlign:"center"
                  }}>
                    <div style={{fontSize:20,marginBottom:2}}>{mt.emoji}</div>
                    <div style={{fontSize:9,fontWeight:700,color:selectedMealType===mt.id ? mt.color : T.textDim}}>{mt.label}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Skapa-ny-knapp */}
            <button onClick={startMealBuilder} className="press-feedback" style={{
              width:"100%",
              background:`linear-gradient(135deg,${T.green},#4aaa4a)`,
              border:"none",
              borderRadius:14,
              padding:"16px",
              cursor:"pointer",
              fontFamily:"inherit",
              marginBottom:16,
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              gap:10,
              boxShadow:`0 4px 16px ${T.green}55`
            }}>
              <span style={{fontSize:24}}>➕</span>
              <span style={{fontSize:15,fontWeight:700,color:"#0d0d0d"}}>Skapa ny måltid</span>
            </button>

            {/* Lista av egna måltider */}
            {myMeals.length === 0 ? (
              <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"32px 18px",textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:14}}>🍽</div>
                <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:6}}>Inga egna måltider än</div>
                <div style={{fontSize:12,color:T.textDim,lineHeight:1.6}}>Bygg din första måltid genom att kombinera ingredienser från matdatabasen!</div>
              </div>
            ) : (
              <>
                <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10,fontWeight:700}}>Mina måltider ({myMeals.length})</div>
                {myMeals.map((meal, i) => (
                  <div key={meal.id} className="stagger-item" style={{
                    background:T.bg2,
                    border:`1px solid ${T.border}`,
                    borderRadius:14,
                    padding:"14px",
                    marginBottom:10,
                    animationDelay:`${i*0.05}s`
                  }}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                      <div style={{fontSize:32}}>{meal.emoji}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:15,fontWeight:700,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{meal.name}</div>
                        <div style={{fontSize:11,color:T.textFaint,marginTop:2}}>
                          {meal.ingredients.length} ingredienser
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:18,fontWeight:700,color:T.accent}}>{meal.kcal}</div>
                        <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase"}}>kcal</div>
                      </div>
                    </div>
                    
                    {/* Makros */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
                      <div style={{textAlign:"center",background:T.bg3,borderRadius:8,padding:"5px"}}>
                        <div style={{fontSize:11,fontWeight:700,color:T.green}}>{meal.protein}g</div>
                        <div style={{fontSize:8,color:T.textFaint,textTransform:"uppercase"}}>Protein</div>
                      </div>
                      <div style={{textAlign:"center",background:T.bg3,borderRadius:8,padding:"5px"}}>
                        <div style={{fontSize:11,fontWeight:700,color:T.blue}}>{meal.carbs}g</div>
                        <div style={{fontSize:8,color:T.textFaint,textTransform:"uppercase"}}>Kolh</div>
                      </div>
                      <div style={{textAlign:"center",background:T.bg3,borderRadius:8,padding:"5px"}}>
                        <div style={{fontSize:11,fontWeight:700,color:T.yellow}}>{meal.fat}g</div>
                        <div style={{fontSize:8,color:T.textFaint,textTransform:"uppercase"}}>Fett</div>
                      </div>
                    </div>
                    
                    {/* Knappar */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:6}}>
                      <button onClick={()=>logMyMeal(meal, selectedMealType)} className="press-feedback" style={{
                        background:`linear-gradient(135deg,${T.green},${T.green}cc)`,
                        color:"#0d0d0d",
                        border:"none",
                        borderRadius:99,
                        padding:"10px",
                        fontSize:12,
                        fontWeight:700,
                        cursor:"pointer",
                        fontFamily:"inherit"
                      }}>✅ Logga</button>
                      <button onClick={()=>editMyMeal(meal)} style={{
                        background:T.bg3,
                        border:`1px solid ${T.border2}`,
                        color:T.text,
                        borderRadius:99,
                        padding:"10px 14px",
                        fontSize:12,
                        cursor:"pointer",
                        fontFamily:"inherit",
                        fontWeight:600
                      }}>✏️</button>
                      <button onClick={()=>deleteMyMeal(meal.id)} style={{
                        background:T.bg3,
                        border:`1px solid ${T.red}44`,
                        color:T.red,
                        borderRadius:99,
                        padding:"10px 14px",
                        fontSize:12,
                        cursor:"pointer",
                        fontFamily:"inherit"
                      }}>🗑</button>
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
        </div>
      )}

      {/* MEAL BUILDER MODAL - skapa/redigera måltid */}
      {mealBuilderOpen && mealBuilder && (
        <div className="modal-enter" style={{position:"fixed",inset:0,zIndex:345,background:T.bg,overflowY:"auto"}}>
          <div style={{maxWidth:540,margin:"0 auto",padding:"44px 16px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <button onClick={()=>{setMealBuilderOpen(false);setMealBuilder(null);}} style={{background:T.bg2,border:"none",color:T.textDim,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
              <div style={{fontSize:18,fontWeight:700,color:T.green}}>{editingMealId ? "✏️ Redigera" : "➕ Ny måltid"}</div>
              <div style={{width:36}}></div>
            </div>

            {/* Namn + emoji */}
            <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:11,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10,fontWeight:700}}>Namn & ikon</div>
              <div style={{display:"flex",gap:10}}>
                {/* Emoji-väljare */}
                <select 
                  value={mealBuilder.emoji} 
                  onChange={e=>setMealBuilder({...mealBuilder, emoji:e.target.value})}
                  style={{
                    background:T.bg3,
                    border:`1px solid ${T.border2}`,
                    borderRadius:10,
                    padding:"12px",
                    fontSize:24,
                    color:T.text,
                    cursor:"pointer",
                    fontFamily:"inherit",
                    outline:"none",
                    width:80,
                    textAlign:"center"
                  }}>
                  {["🍽","🍳","🥗","🍝","🍜","🥘","🍛","🍲","🥪","🌮","🌯","🍱","🍕","🍔","🥞","🍰","🥑","🍌","🥜","💪","🔥","⭐","❤️"].map(e=>(
                    <option key={e} value={e}>{e}</option>
                  ))}
                </select>
                <input
                  type="text"
                  placeholder="T.ex. Min Power-frukost"
                  value={mealBuilder.name}
                  onChange={e=>setMealBuilder({...mealBuilder, name:e.target.value})}
                  style={{
                    flex:1,
                    background:T.bg3,
                    border:`1px solid ${T.border2}`,
                    borderRadius:10,
                    padding:"12px 14px",
                    fontSize:15,
                    color:T.text,
                    fontFamily:"inherit",
                    outline:"none"
                  }}
                />
              </div>
            </div>

            {/* Ingredienser */}
            <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:11,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Ingredienser ({mealBuilder.ingredients.length})</div>
                <button onClick={()=>setShowAddIngredient(true)} className="press-feedback" style={{
                  background:T.green+"22",
                  border:`1px solid ${T.green}`,
                  color:T.green,
                  borderRadius:99,
                  padding:"6px 14px",
                  fontSize:12,
                  fontWeight:700,
                  cursor:"pointer",
                  fontFamily:"inherit"
                }}>+ Lägg till</button>
              </div>
              
              {mealBuilder.ingredients.length === 0 ? (
                <div style={{padding:"20px",textAlign:"center",color:T.textFaint,fontSize:13}}>
                  Inga ingredienser än<br/>
                  <span style={{fontSize:11}}>Tryck "+ Lägg till" för att börja</span>
                </div>
              ) : (
                mealBuilder.ingredients.map((ing, i) => {
                  const f = ing.grams / 100;
                  const ingKcal = Math.round((ing.product.kcal_100g || 0) * f);
                  return (
                    <div key={i} style={{
                      display:"flex",
                      alignItems:"center",
                      gap:10,
                      padding:"10px 0",
                      borderTop:i > 0 ? `1px solid ${T.border}` : "none"
                    }}>
                      {ing.product.image ? (
                        <div style={{width:36,height:36,borderRadius:8,overflow:"hidden",background:T.bg3,flexShrink:0}}>
                          <img src={ing.product.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        </div>
                      ) : (
                        <div style={{width:36,height:36,borderRadius:8,background:T.bg3,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🍽</div>
                      )}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ing.product.name}</div>
                        <div style={{fontSize:11,color:T.textFaint}}>{ing.grams}g · {ingKcal} kcal</div>
                      </div>
                      <button onClick={()=>removeIngredientFromBuilder(i)} style={{background:"transparent",border:"none",color:T.textFaint,cursor:"pointer",fontSize:16,padding:"4px 8px"}}>✕</button>
                    </div>
                  );
                })
              )}
            </div>

            {/* Totaler */}
            {mealBuilder.ingredients.length > 0 && (() => {
              const totals = calcMealTotals(mealBuilder.ingredients);
              return (
                <div style={{background:`linear-gradient(135deg,${T.green}22,${T.green}11)`,border:`1px solid ${T.green}44`,borderRadius:14,padding:"16px",marginBottom:14}}>
                  <div style={{fontSize:11,color:T.green,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10,fontWeight:700}}>Total näringsvärde</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:T.red}}>{totals.kcal}</div>
                      <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase"}}>kcal</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:T.green}}>{totals.protein}g</div>
                      <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase"}}>Protein</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:T.blue}}>{totals.carbs}g</div>
                      <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase"}}>Kolh</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:T.yellow}}>{totals.fat}g</div>
                      <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase"}}>Fett</div>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Spara/Avbryt */}
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:10}}>
              <button onClick={()=>{setMealBuilderOpen(false);setMealBuilder(null);}} style={{
                background:T.bg3,
                border:`1px solid ${T.border2}`,
                color:T.text,
                padding:"14px 20px",
                borderRadius:99,
                fontSize:13,
                cursor:"pointer",
                fontFamily:"inherit",
                fontWeight:600
              }}>Avbryt</button>
              <button onClick={saveMyMeal} className="press-feedback" style={{
                background:`linear-gradient(135deg,${T.green},${T.green}cc)`,
                color:"#0d0d0d",
                border:"none",
                borderRadius:99,
                padding:"14px",
                fontSize:14,
                fontWeight:700,
                cursor:"pointer",
                fontFamily:"inherit",
                boxShadow:`0 4px 16px ${T.green}66`
              }}>{editingMealId ? "💾 Spara ändringar" : "💾 Spara måltid"}</button>
            </div>
          </div>
        </div>
      )}

      {/* LÄGG TILL INGREDIENS MODAL - sökruta för att hitta produkt */}
      {showAddIngredient && mealBuilder && (
        <AddIngredientModal 
          T={T}
          searchFoods={searchFoods}
          onClose={()=>setShowAddIngredient(false)}
          onAdd={addIngredientToBuilder}
          recentFoods={recentFoods}
          favoriteFoods={favoriteFoods}
          isFavoriteFood={isFavoriteFood}
          toggleFavoriteFood={toggleFavoriteFood}
        />
      )}

      {/* MAT-DATABAS MODAL (med skanner + sök + senaste + favoriter) */}
      {showScanner && (
        <div className="modal-enter" style={{position:"fixed",inset:0,zIndex:340,background:T.bg,overflowY:"auto"}}>
          <div style={{maxWidth:540,margin:"0 auto",padding:"44px 16px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <button onClick={closeScannerModal} style={{background:T.bg2,border:"none",color:T.textDim,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
              <div style={{fontSize:18,fontWeight:700,color:T.accent}}>🍽 Logga måltid</div>
              <div style={{width:36}}></div>
            </div>

            {/* Måltidstyp-väljare (visas alltid när inte scannerProduct är aktiv) */}
            {!scannerProduct && (
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontWeight:700}}>📔 Lägg till i:</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                  {[
                    {id:"frukost",emoji:"🌅",label:"Frukost",color:T.yellow},
                    {id:"lunch",emoji:"☀️",label:"Lunch",color:T.blue},
                    {id:"middag",emoji:"🍽",label:"Middag",color:T.accent},
                    {id:"mellanmal",emoji:"🥜",label:"Mellanmål",color:T.green}
                  ].map(mt=>(
                    <button key={mt.id} onClick={()=>setSelectedMealType(mt.id)} className="press-feedback" style={{
                      padding:"10px 4px",
                      background:selectedMealType===mt.id ? mt.color+"22" : T.bg3,
                      border:`1px solid ${selectedMealType===mt.id ? mt.color : T.border}`,
                      borderRadius:10,
                      cursor:"pointer",
                      fontFamily:"inherit",
                      textAlign:"center"
                    }}>
                      <div style={{fontSize:22,marginBottom:2}}>{mt.emoji}</div>
                      <div style={{fontSize:10,fontWeight:700,color:selectedMealType===mt.id ? mt.color : T.textDim}}>{mt.label}</div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Tabbar (sök / senaste / favoriter / streckkod) */}
            {!scannerProduct && (
              <div style={{display:"flex",gap:4,marginBottom:16,background:T.bg2,padding:4,borderRadius:99,border:`1px solid ${T.border}`}}>
                {[
                  {id:"search",label:"🔍 Sök"},
                  {id:"recents",label:`🕒 Senaste${recentFoods.length>0?` (${recentFoods.length})`:""}`},
                  {id:"favorites",label:`❤️ Fav${favoriteFoods.length>0?` (${favoriteFoods.length})`:""}`},
                  {id:"barcode",label:"📷 Skanna"}
                ].map(t=>(
                  <button key={t.id} onClick={()=>setScannerTab(t.id)} style={{
                    flex:1,
                    padding:"8px 4px",
                    background:scannerTab===t.id ? T.accent+"33" : "transparent",
                    border:"none",
                    borderRadius:99,
                    fontSize:11,
                    fontWeight:scannerTab===t.id?700:500,
                    color:scannerTab===t.id ? T.accent : T.textDim,
                    cursor:"pointer",
                    fontFamily:"inherit",
                    transition:"all 0.2s"
                  }}>{t.label}</button>
                ))}
              </div>
            )}

            {/* Steg 1: Skriv in / skanna kod */}
            {!scannerProduct && (
              <>
                {/* TAB: SÖK */}
                {scannerTab === "search" && (
                  <>
                    <div style={{marginBottom:14}}>
                      <input
                        type="text"
                        placeholder="Sök produkt — t.ex. banan, havregryn, kvarg..."
                        value={searchQuery}
                        onChange={e=>{
                          setSearchQuery(e.target.value);
                          // Debounce: vänta 400ms innan sökning
                          clearTimeout(window.__searchTimeout);
                          window.__searchTimeout = setTimeout(()=>searchFoods(e.target.value), 400);
                        }}
                        style={{width:"100%",background:T.bg2,border:`1px solid ${T.border2}`,borderRadius:12,padding:"14px 16px",fontSize:15,color:T.text,fontFamily:"inherit",outline:"none"}}
                      />
                    </div>
                    
                    {searchLoading && (
                      <div style={{textAlign:"center",padding:"30px",color:T.textFaint}}>
                        <div style={{fontSize:24,marginBottom:8}}>⏳</div>
                        <div style={{fontSize:13}}>Söker...</div>
                      </div>
                    )}
                    
                    {!searchLoading && searchQuery.length >= 2 && searchResults.length === 0 && (
                      <div style={{textAlign:"center",padding:"30px",color:T.textFaint,fontSize:13,lineHeight:1.5}}>
                        🤷 Inga produkter hittades<br/>
                        <span style={{fontSize:11}}>Prova en annan söksträng eller skanna streckkoden istället</span>
                      </div>
                    )}
                    
                    {!searchLoading && searchQuery.length < 2 && (
                      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"24px 18px",textAlign:"center"}}>
                        <div style={{fontSize:48,marginBottom:14}}>🔍</div>
                        <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:6}}>Sök i 3+ miljoner produkter</div>
                        <div style={{fontSize:12,color:T.textDim,lineHeight:1.6}}>Skriv minst 2 bokstäver för att börja söka.<br/>Funkar på svenska & engelska!</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginTop:14}}>
                          {["banan","havregryn","kyckling","kvarg","bröd"].map(s=>(
                            <button key={s} onClick={()=>{setSearchQuery(s);searchFoods(s);}} style={{background:T.bg3,border:`1px solid ${T.border2}`,color:T.textDim,padding:"5px 11px",borderRadius:99,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>
                          ))}
                        </div>
                      </div>
                    )}
                    
                    {searchResults.length > 0 && searchResults.map((p,i) => (
                      <FoodItemRow key={p.barcode} product={p} isFavorite={isFavoriteFood(p.barcode)} onSelect={()=>{setScannerProduct(p);setScannerPortion(100);}} onToggleFav={()=>toggleFavoriteFood(p)} T={T} index={i}/>
                    ))}
                  </>
                )}

                {/* TAB: SENASTE */}
                {scannerTab === "recents" && (
                  <>
                    {recentFoods.length === 0 ? (
                      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"32px 18px",textAlign:"center"}}>
                        <div style={{fontSize:48,marginBottom:14}}>🕒</div>
                        <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:6}}>Inga senaste än</div>
                        <div style={{fontSize:12,color:T.textDim,lineHeight:1.6}}>Produkter du loggar dyker upp här för snabb åtkomst</div>
                      </div>
                    ) : (
                      <>
                        <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10,fontWeight:700}}>Senast loggade</div>
                        {recentFoods.map((p,i) => (
                          <FoodItemRow key={p.barcode+"_"+i} product={p} isFavorite={isFavoriteFood(p.barcode)} onSelect={()=>{setScannerProduct(p);setScannerPortion(100);}} onToggleFav={()=>toggleFavoriteFood(p)} T={T} index={i}/>
                        ))}
                      </>
                    )}
                  </>
                )}

                {/* TAB: FAVORITER */}
                {scannerTab === "favorites" && (
                  <>
                    {favoriteFoods.length === 0 ? (
                      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"32px 18px",textAlign:"center"}}>
                        <div style={{fontSize:48,marginBottom:14}}>❤️</div>
                        <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:6}}>Inga favoriter än</div>
                        <div style={{fontSize:12,color:T.textDim,lineHeight:1.6}}>Tryck på ❤️ bredvid en produkt för att spara den här</div>
                      </div>
                    ) : (
                      <>
                        <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10,fontWeight:700}}>Mina favoriter</div>
                        {favoriteFoods.map((p,i) => (
                          <FoodItemRow key={p.barcode+"_fav_"+i} product={p} isFavorite={true} onSelect={()=>{setScannerProduct(p);setScannerPortion(100);}} onToggleFav={()=>toggleFavoriteFood(p)} T={T} index={i}/>
                        ))}
                      </>
                    )}
                  </>
                )}

                {/* TAB: STRECKKOD */}
                {scannerTab === "barcode" && (
                  <>
                {/* Stor skanna-knapp för kameran */}
                <div style={{background:T.bg2,border:`1px dashed ${T.accent}`,borderRadius:16,padding:"32px 20px",marginBottom:16,textAlign:"center"}}>
                  <div style={{fontSize:60,marginBottom:12}}>📷</div>
                  <div style={{fontSize:13,color:T.textDim,marginBottom:18,lineHeight:1.5}}>
                    Använd kameran för att läsa streckkoden eller skriv in 8-13 siffror manuellt
                  </div>
                  <label className="press-feedback" style={{display:"inline-block",background:`linear-gradient(135deg,${T.accent},${T.yellow})`,color:"#0d0d0d",border:"none",borderRadius:99,padding:"12px 24px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    📸 Öppna kamera
                    <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={async (e) => {
                      const file = e.target.files[0];
                      if (!file) return;
                      // För nu: visa meddelande att kamera-skanner kommer snart
                      // (Riktig OCR/streckkods-läsning kräver bibliotek vi kan lägga till senare)
                      alert("📸 Kamera-läsning kommer snart!\n\nFör nu: skriv in streckkoden manuellt nedan (siffrorna under streckkoden på förpackningen).");
                    }}/>
                  </label>
                </div>

                {/* Manuell input */}
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:16}}>
                  <div style={{fontSize:11,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10,fontWeight:700}}>Skriv in streckkod manuellt</div>
                  <div style={{display:"flex",gap:8}}>
                    <input
                      type="number"
                      placeholder="73-XXXXXXX-XXX"
                      value={scannerInput}
                      onChange={e=>setScannerInput(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")lookupBarcode(scannerInput);}}
                      style={{flex:1,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:10,padding:"14px",fontSize:16,color:T.text,fontFamily:"monospace",outline:"none",letterSpacing:"0.05em"}}
                    />
                    <button onClick={()=>lookupBarcode(scannerInput)} disabled={!scannerInput || scannerLoading} className="press-feedback" style={{background:scannerInput?`linear-gradient(135deg,${T.accent},${T.yellow})`:T.bg3,color:scannerInput?"#0d0d0d":T.textFaint,border:"none",borderRadius:10,padding:"0 20px",fontSize:14,fontWeight:700,cursor:scannerInput?"pointer":"not-allowed",fontFamily:"inherit"}}>
                      {scannerLoading ? "..." : "🔍"}
                    </button>
                  </div>
                  <div style={{fontSize:11,color:T.textFaint,marginTop:8,lineHeight:1.5}}>
                    💡 Tips: Streckkoden är de 8-13 siffrorna UNDER streckkoden på matförpackningen
                  </div>
                </div>

                {/* Felmeddelande */}
                {scannerError && (
                  <div style={{background:isDark?"#2a1414":"#ffe8e8",border:`1px solid ${T.red}66`,borderRadius:12,padding:"14px",fontSize:13,color:T.red,whiteSpace:"pre-line"}}>
                    {scannerError}
                  </div>
                )}

                {/* Test-koder */}
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginTop:16}}>
                  <div style={{fontSize:11,color:T.textDim,marginBottom:10,fontWeight:600}}>🧪 Testa med dessa koder:</div>
                  {[
                    {code:"7310070003186", name:"Wasa Sport"},
                    {code:"7340011446965", name:"Felix Köttbullar"},
                    {code:"7311170002613", name:"Coca-Cola"},
                    {code:"7300153901019", name:"Kvarg Vanilj"},
                  ].map(t => (
                    <button key={t.code} onClick={()=>{setScannerInput(t.code);lookupBarcode(t.code);}} style={{display:"block",width:"100%",background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:8,padding:"8px 12px",marginBottom:6,cursor:"pointer",fontFamily:"inherit",textAlign:"left",fontSize:12,color:T.text}}>
                      <span style={{color:T.accent,fontFamily:"monospace"}}>{t.code}</span> · <span style={{color:T.textDim}}>{t.name}</span>
                    </button>
                  ))}
                </div>
                </>
                )}
              </>
            )}

            {/* Steg 2: Visa hittad produkt + välj portion */}
            {scannerProduct && (
              <>
                {/* Produkt-info */}
                <div style={{background:T.bg2,border:`1px solid ${T.green}44`,borderRadius:16,padding:"20px",marginBottom:16}}>
                  <div style={{display:"flex",gap:14,marginBottom:14}}>
                    {scannerProduct.image && (
                      <div style={{width:80,height:80,borderRadius:12,overflow:"hidden",background:T.bg3,flexShrink:0}}>
                        <img src={scannerProduct.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      </div>
                    )}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:16,fontWeight:700,color:T.text,marginBottom:4,lineHeight:1.2}}>{scannerProduct.name}</div>
                      {scannerProduct.brand && <div style={{fontSize:12,color:T.textDim,marginBottom:6}}>{scannerProduct.brand}</div>}
                      <div style={{fontSize:11,color:T.textFaint,fontFamily:"monospace"}}>📊 {scannerProduct.barcode}</div>
                    </div>
                  </div>
                  
                  {/* Näringsvärde per 100g */}
                  <div style={{background:T.bg3,borderRadius:10,padding:"12px",marginBottom:12}}>
                    <div style={{fontSize:10,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8,textAlign:"center"}}>Per 100g</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                      {[
                        {label:"kcal", val:scannerProduct.kcal_100g, color:T.red},
                        {label:"protein", val:scannerProduct.protein_100g+"g", color:T.green},
                        {label:"kolh", val:scannerProduct.carbs_100g+"g", color:T.blue},
                        {label:"fett", val:scannerProduct.fat_100g+"g", color:T.yellow},
                      ].map(m=>(
                        <div key={m.label} style={{textAlign:"center"}}>
                          <div style={{fontSize:14,fontWeight:700,color:m.color}}>{m.val}</div>
                          <div style={{fontSize:8,color:T.textFaint,textTransform:"uppercase",marginTop:2}}>{m.label}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Portionsväljare */}
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:16}}>
                  <div style={{fontSize:11,color:T.accent,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:14,fontWeight:700}}>Hur mycket åt du?</div>
                  
                  {/* Snabb-knappar */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:14}}>
                    {[25, 50, 100, 200].map(g=>(
                      <button key={g} onClick={()=>setScannerPortion(g)} className="press-feedback" style={{padding:"10px 4px",background:scannerPortion===g?`linear-gradient(135deg,${T.accent},${T.yellow})`:T.bg3,border:`1px solid ${scannerPortion===g?T.accent:T.border2}`,borderRadius:10,fontSize:12,fontWeight:700,color:scannerPortion===g?"#0d0d0d":T.text,cursor:"pointer",fontFamily:"inherit"}}>
                        {g}g
                      </button>
                    ))}
                  </div>

                  {/* Custom slider */}
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{fontSize:11,color:T.textDim}}>Anpassa exakt:</span>
                      <span style={{fontSize:18,fontWeight:700,color:T.accent}}>{scannerPortion}g</span>
                    </div>
                    <input type="range" min="5" max="500" step="5" value={scannerPortion} onChange={e=>setScannerPortion(Number(e.target.value))}
                      style={{width:"100%",height:6,borderRadius:99,appearance:"none",background:`linear-gradient(90deg, ${T.accent} ${((scannerPortion-5)/495)*100}%, ${T.border2} ${((scannerPortion-5)/495)*100}%)`,outline:"none",cursor:"pointer"}}/>
                  </div>
                </div>

                {/* Förhandsvisning av tillagd måltid */}
                <div style={{background:`linear-gradient(135deg,${T.green}22,${T.green}11)`,border:`1px solid ${T.green}44`,borderRadius:14,padding:"16px",marginBottom:16}}>
                  <div style={{fontSize:11,color:T.green,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10,fontWeight:700}}>Du loggar:</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                    {[
                      {label:"kcal", val:Math.round(scannerProduct.kcal_100g*(scannerPortion/100)), color:T.red},
                      {label:"protein", val:(scannerProduct.protein_100g*(scannerPortion/100)).toFixed(1)+"g", color:T.green},
                      {label:"kolh", val:(scannerProduct.carbs_100g*(scannerPortion/100)).toFixed(1)+"g", color:T.blue},
                      {label:"fett", val:(scannerProduct.fat_100g*(scannerPortion/100)).toFixed(1)+"g", color:T.yellow},
                    ].map(m=>(
                      <div key={m.label} style={{textAlign:"center"}}>
                        <div style={{fontSize:18,fontWeight:700,color:m.color}}>{m.val}</div>
                        <div style={{fontSize:9,color:T.textFaint,textTransform:"uppercase",marginTop:2}}>{m.label}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Knappar */}
                <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:10}}>
                  <button onClick={()=>{setScannerProduct(null);setScannerInput("");}} style={{background:T.bg3,border:`1px solid ${T.border2}`,color:T.text,padding:"14px 20px",borderRadius:99,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>← Annan</button>
                  <button onClick={addScannedToTracker} className="press-feedback" style={{background:`linear-gradient(135deg,${T.green},${T.green}cc)`,color:"#0d0d0d",border:"none",borderRadius:99,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",boxShadow:`0 4px 16px ${T.green}66`}}>
                    ✅ Lägg till i {selectedMealType === "frukost" ? "🌅 Frukost" : selectedMealType === "lunch" ? "☀️ Lunch" : selectedMealType === "middag" ? "🍽 Middag" : "🥜 Mellanmål"}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* COACH-modal */}
      {showCoach && (
        <div className="modal-enter" style={{position:"fixed",inset:0,zIndex:330,background:T.bg,overflowY:"auto"}}>
          <div style={{maxWidth:540,margin:"0 auto",padding:"44px 16px 40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
              <button onClick={()=>setShowCoach(false)} style={{background:T.bg2,border:"none",color:T.textDim,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
              <div style={{fontSize:18,fontWeight:700,color:T.blue}}>🏋️ Coach</div>
              <div style={{width:36}}></div>
            </div>

            {/* Tre olika lägen: ingen relation, är coach, är klient */}
            
            {/* LÄGE 1: Du är klient */}
            {coachId && !isCoach && (
              <div style={{background:T.bg2,border:`1px solid ${T.blue}44`,borderRadius:16,padding:"20px",marginBottom:20,textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:10}}>👤</div>
                <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Din coach</div>
                <div style={{fontSize:24,fontWeight:700,color:T.blue,marginBottom:6}}>{coachName}</div>
                <div style={{fontSize:12,color:T.textFaint,marginBottom:16}}>Din coach betalar din premium-prenumeration ✨</div>
                <button onClick={async()=>{
                  if(!confirm("Vill du verkligen koppla bort dig från " + coachName + "?")) return;
                  // Ta bort från coachens klient-lista
                  try {
                    const cs = await fb.db.collection("users").doc(coachId).get();
                    if (cs.exists) {
                      const cd = cs.data();
                      const newList = (cd.clientIds || []).filter(c => c !== user.uid);
                      await fb.db.collection("users").doc(coachId).set({clientIds: newList}, {merge: true});
                    }
                  } catch(e) { console.log(e); }
                  setCoachId("");
                  setCoachName("");
                  setIsPremium(false);
                  await saveToCloud({coachId: "", coachName: "", userTier: "free"});
                  alert("Du är inte längre klient hos " + coachName);
                }} style={{background:"transparent",border:`1px solid ${T.red}44`,color:T.red,padding:"8px 16px",borderRadius:99,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                  Koppla bort coach
                </button>
              </div>
            )}

            {/* LÄGE 2: Du är coach */}
            {isCoach && (
              <>
                <div style={{background:`linear-gradient(135deg,${T.blue}22,${T.green}11)`,border:`1px solid ${T.blue}44`,borderRadius:16,padding:"20px",marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{fontSize:14,fontWeight:700,color:T.text}}>🏋️ Coach-läge aktivt</div>
                    <div style={{fontSize:11,color:T.green,background:T.green+"22",padding:"3px 10px",borderRadius:99}}>Aktiv</div>
                  </div>
                  <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Din inbjudningskod</div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{flex:1,background:T.bg3,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",fontSize:18,fontWeight:700,color:T.accent,fontFamily:"monospace",letterSpacing:"0.1em"}}>{inviteCode}</div>
                    <button onClick={()=>{
                      if(navigator.clipboard){navigator.clipboard.writeText(inviteCode);alert("📋 Kopierat!");}
                    }} className="press-feedback" style={{background:T.blue,color:"#fff",border:"none",borderRadius:10,padding:"12px 16px",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600}}>📋</button>
                  </div>
                  <div style={{fontSize:11,color:T.textFaint,marginTop:8}}>Skicka denna kod till dina klienter — de skriver in den i appen för att kopplas till dig.</div>
                </div>

                {/* Klient-lista */}
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:16}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em"}}>Mina klienter ({clientIds.length})</div>
                    <button onClick={loadCoachClients} style={{background:T.bg3,border:"none",color:T.textDim,padding:"4px 10px",borderRadius:99,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>↻ Uppdatera</button>
                  </div>
                  {coachLoading ? (
                    <div style={{textAlign:"center",color:T.textFaint,padding:"30px"}}>⏳ Laddar...</div>
                  ) : coachClients.length === 0 ? (
                    <div style={{textAlign:"center",color:T.textFaint,fontSize:13,padding:"20px 0"}}>
                      Inga klienter än! Dela din kod ovan så börjar de ansluta.
                    </div>
                  ) : (
                    coachClients.map((c,i) => (
                      <div key={c.uid} className="stagger-item" style={{padding:"12px 0",borderBottom:i < coachClients.length-1 ? `1px solid ${T.border}` : "none"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:8}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,color:T.text,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
                            <div style={{fontSize:11,color:T.textFaint,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                              {c.goal === "deffa" ? "🔥 Deffa" : "💪 Bulka"} · {c.dailyKcal} kcal · 🔥 {c.streak} dagar
                            </div>
                            <div style={{fontSize:10,color:c.todayKcal > 0 ? T.green : T.textFaint,marginTop:2}}>
                              Idag: {Math.round(c.todayKcal)}/{c.dailyKcal} kcal
                              {c.todayMeals && c.todayMeals.length > 0 && <span style={{marginLeft:6,color:T.blue}}>· {c.todayMeals.length} måltider</span>}
                            </div>
                          </div>
                          <button onClick={()=>removeClient(c.uid)} style={{background:"transparent",border:"none",color:T.textFaint,cursor:"pointer",fontSize:16,padding:"4px 6px",flexShrink:0}}>✕</button>
                        </div>
                        
                        {/* Tre knappar för coach: Dagbok / Statistik / Redigera */}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                          <button onClick={()=>setViewingClientDiary(c)} className="press-feedback" style={{
                            background:`linear-gradient(135deg,${T.green}33,${T.green}22)`,
                            border:`1px solid ${T.green}66`,
                            color:T.green,
                            padding:"8px 10px",
                            borderRadius:99,
                            fontSize:11,
                            cursor:"pointer",
                            fontFamily:"inherit",
                            fontWeight:700
                          }}>📊 Se dagbok</button>
                          <button onClick={()=>{
                            setEditingClient(c);
                            setClientEdits({
                              kcal: c.dailyKcal || 2000,
                              protein: c.customProtein || 0,
                              carbs: c.customCarbs || 0,
                              fat: c.customFat || 0,
                              goal: c.goal || "deffa",
                              note: c.coachNote || ""
                            });
                          }} className="press-feedback" style={{
                            background:`linear-gradient(135deg,${T.blue}33,${T.blue}22)`,
                            border:`1px solid ${T.blue}66`,
                            color:T.blue,
                            padding:"8px 10px",
                            borderRadius:99,
                            fontSize:11,
                            cursor:"pointer",
                            fontFamily:"inherit",
                            fontWeight:700
                          }}>✏️ Redigera plan</button>
                        </div>
                      </div>
                    ))
                  )}
                </div>

                {/* Pricing-info för coach */}
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:14}}>
                  <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Coach-prislista (kommer snart)</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8,fontSize:12,color:T.textDim}}>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
                      <span>Coach Basic (10 klienter)</span>
                      <span style={{color:T.accent,fontWeight:700}}>299 kr/mån</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
                      <span>Coach Pro (50 klienter)</span>
                      <span style={{color:T.accent,fontWeight:700}}>599 kr/mån</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0"}}>
                      <span>Coach Business (obegränsat)</span>
                      <span style={{color:T.accent,fontWeight:700}}>1499 kr/mån</span>
                    </div>
                  </div>
                </div>
                
                {/* Avsluta coach-konto */}
                <div style={{background:T.bg2,border:`1px solid ${T.red}33`,borderRadius:14,padding:"16px"}}>
                  <div style={{fontSize:11,color:T.red,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8,fontWeight:700}}>⚠️ Farozon</div>
                  <div style={{fontSize:12,color:T.textDim,lineHeight:1.5,marginBottom:12}}>
                    Avslutar du ditt coach-konto behåller alla klienter sin nuvarande plan men blir vanliga premium-användare.
                  </div>
                  <button onClick={async () => {
                    const clientCount = clientIds.length;
                    const msg = clientCount > 0 
                      ? `Är du säker på att du vill avsluta ditt coach-konto?\n\n${clientCount} ${clientCount === 1 ? "klient" : "klienter"} kommer att kopplas bort men behåller sina kalori- och makromål.`
                      : `Är du säker på att du vill avsluta ditt coach-konto?`;
                    if (!confirm(msg)) return;
                    
                    // Koppla bort alla klienter (de behåller sina kcal/makros men blir vanliga premium)
                    for (const clientUid of clientIds) {
                      try {
                        await fb.db.collection("users").doc(clientUid).set({
                          coachId: "",
                          coachName: "",
                          userTier: "free",
                          coachNote: "",
                          mealComments: {}
                        }, {merge: true});
                      } catch(e) { console.log("Disconnect client error:", e); }
                    }
                    
                    // Stäng av coach-status
                    setIsCoach(false);
                    setCoachId("");
                    setCoachName("");
                    setInviteCode("");
                    setClientIds([]);
                    setCoachClients([]);
                    
                    await saveToCloud({
                      isCoach: false,
                      coachId: "",
                      coachName: "",
                      inviteCode: "",
                      clientIds: []
                    });
                    
                    alert("Coach-kontot är nu avslutat. Du kan när som helst aktivera det igen via 'Bli coach'.");
                    setShowCoach(false);
                  }} style={{
                    width:"100%",
                    background:"transparent",
                    border:`1px solid ${T.red}66`,
                    color:T.red,
                    padding:"12px",
                    borderRadius:99,
                    fontSize:13,
                    cursor:"pointer",
                    fontFamily:"inherit",
                    fontWeight:600
                  }}>❌ Avsluta coach-konto</button>
                </div>
              </>
            )}

            {/* LÄGE 3: Varken coach eller klient — visa båda alternativen */}
            {!isCoach && !coachId && (
              <>
                {/* Bli coach */}
                <div style={{background:T.bg2,border:`1px solid ${T.blue}44`,borderRadius:16,padding:"20px",marginBottom:14}}>
                  <div style={{fontSize:32,marginBottom:10}}>🏋️</div>
                  <div style={{fontSize:18,fontWeight:700,color:T.blue,marginBottom:6}}>Bli coach</div>
                  <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,marginBottom:14}}>
                    Du kanske är personlig tränare, kostrådgivare eller vän som hjälper andra? Bli coach och hantera dina klienter genom appen.
                  </div>
                  <ul style={{fontSize:12,color:T.textFaint,marginLeft:18,marginBottom:16,lineHeight:1.7}}>
                    <li>Bjud in obegränsat antal klienter med en kod</li>
                    <li>Se klienternas progress, mål & streaks</li>
                    <li>Klienterna får automatiskt premium</li>
                  </ul>
                  <button onClick={becomeCoach} className="press-feedback" style={{width:"100%",background:`linear-gradient(135deg,${T.blue},${T.green})`,color:"#fff",border:"none",borderRadius:99,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    🚀 Bli coach
                  </button>
                </div>

                {/* Anslut som klient */}
                <div style={{background:T.bg2,border:`1px solid ${T.green}44`,borderRadius:16,padding:"20px"}}>
                  <div style={{fontSize:32,marginBottom:10}}>🎁</div>
                  <div style={{fontSize:18,fontWeight:700,color:T.green,marginBottom:6}}>Anslut till en coach</div>
                  <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,marginBottom:14}}>
                    Har du fått en kod från din coach? Skriv in den här så får du <strong style={{color:T.accent}}>premium gratis</strong> via din coach.
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <input
                      type="text"
                      placeholder="C-XXXXXX"
                      value={redeemCode}
                      onChange={e=>setRedeemCode(e.target.value.toUpperCase())}
                      style={{flex:1,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:10,padding:"12px 14px",fontSize:14,color:T.text,fontFamily:"monospace",outline:"none",letterSpacing:"0.1em",textTransform:"uppercase"}}
                    />
                    <button onClick={connectAsClient} className="press-feedback" style={{background:T.green,color:"#fff",border:"none",borderRadius:10,padding:"0 20px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                      Anslut
                    </button>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* VIKTLOGG-modal */}
      {showWeightLog && (() => {
        const sortedLog = [...weightLog].sort((a,b) => a.date.localeCompare(b.date));
        const latestWeight = sortedLog.length > 0 ? sortedLog[sortedLog.length-1].weight : profile.weight || 0;
        const firstWeight = sortedLog.length > 0 ? sortedLog[0].weight : latestWeight;
        const diff = latestWeight - firstWeight;
        const minW = Math.min(...sortedLog.map(w=>w.weight), latestWeight);
        const maxW = Math.max(...sortedLog.map(w=>w.weight), latestWeight);
        const range = Math.max(2, maxW - minW);
        
        return (
          <div className="modal-enter" style={{position:"fixed",inset:0,zIndex:330,background:T.bg,overflowY:"auto"}}>
            <div style={{maxWidth:540,margin:"0 auto",padding:"44px 16px 40px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
                <button onClick={()=>setShowWeightLog(false)} style={{background:T.bg2,border:"none",color:T.textDim,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
                <div style={{fontSize:18,fontWeight:700,color:T.blue}}>⚖️ Viktlogg</div>
                <div style={{width:36}}></div>
              </div>

              {/* Stor visning av nuvarande vikt + förändring */}
              <div style={{background:T.bg2,border:`1px solid ${T.blue}33`,borderRadius:16,padding:"24px",marginBottom:20,textAlign:"center"}}>
                <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Nuvarande vikt</div>
                <div style={{fontSize:48,fontWeight:700,background:`linear-gradient(135deg,${T.blue},${T.green})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1,marginBottom:8}}>{latestWeight} <span style={{fontSize:24}}>kg</span></div>
                {sortedLog.length > 1 && (
                  <div style={{fontSize:13,color:diff < 0 ? T.green : (diff > 0 ? T.accent : T.textFaint),fontWeight:600}}>
                    {diff < 0 ? "▼" : (diff > 0 ? "▲" : "—")} {Math.abs(diff).toFixed(1)} kg sedan start
                  </div>
                )}
              </div>

              {/* Logga ny vikt */}
              <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:20}}>
                <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Logga dagens vikt</div>
                <div style={{display:"flex",gap:8}}>
                  <input
                    type="number"
                    step="0.1"
                    placeholder={`${profile.weight || 80}`}
                    value={newWeight}
                    onChange={e=>setNewWeight(e.target.value)}
                    style={{flex:1,background:T.bg3,border:`1px solid ${T.border2}`,borderRadius:10,padding:"12px 14px",fontSize:16,color:T.text,fontFamily:"inherit",outline:"none"}}
                  />
                  <button onClick={()=>logWeight(newWeight)} className="press-feedback" style={{background:`linear-gradient(135deg,${T.blue},${T.green})`,color:"#fff",border:"none",borderRadius:10,padding:"0 22px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Logga</button>
                </div>
              </div>

              {/* Viktkurva */}
              {sortedLog.length >= 2 && (
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:20}}>
                  <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Viktkurva ({sortedLog.length} loggningar)</div>
                  <div style={{position:"relative",height:160,padding:"10px 0"}}>
                    {/* Grid-linjer */}
                    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
                      {[0,1,2,3].map(i=>(
                        <div key={i} style={{borderTop:`1px dashed ${T.border}`,height:0}}/>
                      ))}
                    </div>
                    {/* SVG-linje */}
                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
                      <polyline
                        points={sortedLog.map((w,i) => {
                          const x = (i / (sortedLog.length-1)) * 100;
                          const y = 100 - (((w.weight - minW) / range) * 90 + 5);
                          return `${x},${y}`;
                        }).join(" ")}
                        fill="none"
                        stroke={T.blue}
                        strokeWidth="0.8"
                        strokeLinejoin="round"
                        strokeLinecap="round"
                      />
                      {/* Punkter */}
                      {sortedLog.map((w,i) => {
                        const x = (i / (sortedLog.length-1)) * 100;
                        const y = 100 - (((w.weight - minW) / range) * 90 + 5);
                        return <circle key={i} cx={x} cy={y} r="1.2" fill={T.green}/>;
                      })}
                    </svg>
                    {/* Y-axis-text */}
                    <div style={{position:"absolute",left:0,top:0,fontSize:9,color:T.textFaint}}>{maxW.toFixed(1)} kg</div>
                    <div style={{position:"absolute",left:0,bottom:0,fontSize:9,color:T.textFaint}}>{minW.toFixed(1)} kg</div>
                  </div>
                </div>
              )}

              {/* Historiska loggningar */}
              <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px"}}>
                <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Alla loggningar</div>
                {sortedLog.length === 0 ? (
                  <div style={{textAlign:"center",color:T.textFaint,fontSize:13,padding:"20px 0"}}>Inga loggningar än. Logga din första vikt ovan!</div>
                ) : (
                  [...sortedLog].reverse().map((w,i) => (
                    <div key={w.date} className="stagger-item" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i < sortedLog.length-1 ? `1px solid ${T.border}` : "none"}}>
                      <div>
                        <div style={{fontSize:13,color:T.text,fontWeight:600}}>{new Date(w.date).toLocaleDateString("sv-SE", {year:"numeric",month:"long",day:"numeric"})}</div>
                        <div style={{fontSize:18,fontWeight:700,color:T.blue}}>{w.weight} <span style={{fontSize:11,color:T.textFaint}}>kg</span></div>
                      </div>
                      <button onClick={()=>removeWeightEntry(w.date)} style={{background:"transparent",border:"none",color:T.textFaint,cursor:"pointer",fontSize:18,padding:"4px 8px"}}>✕</button>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {/* HISTORIK-modal */}
      {showHistory && (() => {
        const sortedHistory = [...mealHistory].sort((a,b) => b.date.localeCompare(a.date));
        const last7 = sortedHistory.slice(0, 7).reverse(); // för veckograf
        const avgKcal = sortedHistory.length > 0 ? sortedHistory.reduce((s,h)=>s+h.kcal,0) / sortedHistory.length : 0;
        const goalReachedDays = sortedHistory.filter(h => h.kcal >= h.goal * 0.9 && h.kcal <= h.goal * 1.1).length;
        const maxKcal = Math.max(...last7.map(h=>h.kcal), dailyKcal);
        
        return (
          <div className="modal-enter" style={{position:"fixed",inset:0,zIndex:330,background:T.bg,overflowY:"auto"}}>
            <div style={{maxWidth:540,margin:"0 auto",padding:"44px 16px 40px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
                <button onClick={()=>setShowHistory(false)} style={{background:T.bg2,border:"none",color:T.textDim,width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:16}}>←</button>
                <div style={{fontSize:18,fontWeight:700,color:T.green}}>📊 Historik</div>
                <div style={{width:36}}></div>
              </div>

              {/* Sammanfattning */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px"}}>
                  <div style={{fontSize:10,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em"}}>Snitt kcal</div>
                  <div style={{fontSize:22,fontWeight:700,color:T.accent,marginTop:4}}>{Math.round(avgKcal).toLocaleString()}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>per dag</div>
                </div>
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px"}}>
                  <div style={{fontSize:10,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em"}}>Mål uppnådda</div>
                  <div style={{fontSize:22,fontWeight:700,color:T.green,marginTop:4}}>{goalReachedDays}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>av {sortedHistory.length} dagar</div>
                </div>
              </div>

              {/* Veckograf */}
              {last7.length > 0 && (
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:18}}>
                  <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Senaste 7 dagarna</div>
                  <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",height:120,gap:6,paddingBottom:20,position:"relative"}}>
                    {/* Mål-linje */}
                    <div style={{position:"absolute",left:0,right:0,height:1,background:T.green,opacity:0.3,top:`${100 - (dailyKcal/maxKcal)*100}%`}}></div>
                    
                    {last7.map((h,i)=>{
                      const heightPct = (h.kcal / maxKcal) * 100;
                      const reached = h.kcal >= h.goal * 0.9 && h.kcal <= h.goal * 1.1;
                      const dayName = new Date(h.date).toLocaleDateString("sv-SE", {weekday:"short"}).slice(0,2);
                      return (
                        <div key={h.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end",position:"relative"}}>
                          <div style={{
                            width:"100%",
                            height:`${heightPct}%`,
                            background:reached ? `linear-gradient(180deg,${T.green},${T.green}cc)` : `linear-gradient(180deg,${T.accent},${T.accent}cc)`,
                            borderRadius:"6px 6px 0 0",
                            transition:"all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)",
                            minHeight:4
                          }}></div>
                          <div style={{position:"absolute",bottom:-18,fontSize:10,color:T.textFaint}}>{dayName}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Lista över alla dagar */}
              <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px"}}>
                <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Alla loggade dagar</div>
                {sortedHistory.length === 0 ? (
                  <div style={{textAlign:"center",color:T.textFaint,fontSize:13,padding:"20px 0"}}>Ingen historik än. Logga några måltider först — så börjar resan här! 🚀</div>
                ) : (
                  sortedHistory.map((h,i) => {
                    const reached = h.kcal >= h.goal * 0.9 && h.kcal <= h.goal * 1.1;
                    const pct = Math.round((h.kcal / h.goal) * 100);
                    return (
                      <div key={h.date} className="stagger-item" style={{padding:"12px 0",borderBottom:i < sortedHistory.length-1 ? `1px solid ${T.border}` : "none"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          <div style={{fontSize:12,color:T.text,fontWeight:600}}>{new Date(h.date).toLocaleDateString("sv-SE", {weekday:"long",day:"numeric",month:"short"})}</div>
                          <div style={{fontSize:11,color:reached?T.green:T.textFaint,fontWeight:600}}>{pct}% av mål</div>
                        </div>
                        <div style={{display:"flex",gap:12,fontSize:11,color:T.textDim}}>
                          <span style={{color:T.accent}}><strong>{Math.round(h.kcal)}</strong> kcal</span>
                          <span style={{color:T.green}}><strong>{Math.round(h.protein)}</strong>g protein</span>
                          <span style={{color:T.blue}}>💧 {h.water}/8</span>
                          <span style={{color:T.textFaint}}>🍽 {h.mealCount} måltider</span>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>
        );
      })()}

            </div>

            {/* Statistik-dashboard */}
            {!selectedUser && (
              <div style={{marginBottom:20}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>

      {/* ONBOARDING WIZARD */}
